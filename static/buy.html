<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Buy Products</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;font-family:'Poppins',sans-serif;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .cat-btn{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .cat-btn:hover,.cat-btn.active{border-color:rgba(16,185,129,.4);color:#34d399;background:rgba(16,185,129,.08)}
    .p-card{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s}
    .p-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.3);border-color:rgba(16,185,129,.3)}
    .p-card img{width:100%;height:160px;object-fit:cover}
    .p-card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:6px}
    .p-buy-btn{margin-top:auto;padding:10px;border-radius:10px;background:linear-gradient(135deg,#10b981,#0ea5e9);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:13px;font-family:'Poppins',sans-serif;transition:box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 12px rgba(16,185,129,.2)}
    .p-buy-btn:hover{box-shadow:0 6px 20px rgba(16,185,129,.4)}
    @media(max-width:640px){
      .cat-wrap{gap:6px !important}
      .cat-btn{padding:6px 10px;font-size:12px}
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<script src="/theme.js"></script>
<div id="site-header"></div>
<script src="/header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight"><i class="fa-solid fa-basket-shopping mr-2 text-emerald-400"></i>Buy <span class="gradient-text">Products</span></h1>
    <p class="mt-1 text-slate-400 text-sm">Browse and add items to your cart.</p>
  </div>

  <!-- Search -->
  <div class="glass-panel rounded-2xl p-4 mb-5">
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
        <input id="q" class="agri-input w-full pl-9 pr-4 py-3 rounded-xl text-sm" placeholder="Search products, e.g. tomato">
      </div>
      <div class="flex gap-2">
        <button id="buy-voice-btn" type="button" title="Voice search" class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;cursor:pointer;font-size:14px"><i class="fa-solid fa-microphone"></i></button>
        <button onclick="doSearch()" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-search fa-sm"></i> Search
        </button>
      </div>
    </div>
  </div>

  <!-- Category Filters -->
  <div class="flex flex-wrap gap-2 mb-6 cat-wrap">
    <button class="cat-btn" onclick="filter('fruits')"><i class="fa-solid fa-apple-whole fa-xs"></i>Fruits</button>
    <button class="cat-btn" onclick="filter('vegetables')"><i class="fa-solid fa-carrot fa-xs"></i>Vegetables</button>
    <button class="cat-btn" onclick="filter('grains')"><i class="fa-solid fa-wheat-awn fa-xs"></i>Grains</button>
    <button class="cat-btn" onclick="filter('seeds')"><i class="fa-solid fa-seedling fa-xs"></i>Seeds</button>
    <button class="cat-btn" onclick="loadProducts()" style="border-color:rgba(16,185,129,.3);color:#34d399"><i class="fa-solid fa-border-all fa-xs"></i>All</button>
  </div>

  <!-- Product Grid -->
  <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
</main>

<script>
  async function loadProducts(q){
    let url='/api/marketplace';
    if(q){
      if((q||'').toString().toLowerCase()==='deals') url+='?q=deals&today=true';
      else url+='?q='+encodeURIComponent(q);
    }
    const r=await fetch(url); const j=await r.json();
    const items=j.items||[];
    window.LAST_PRODUCTS=items;
    const el=document.getElementById('products'); el.innerHTML='';
    if(!items.length){el.innerHTML='<div class="col-span-full text-center py-16"><i class="fa-solid fa-box-open text-4xl text-slate-600 mb-3 block"></i><p class="text-slate-500 text-sm">No listings found.</p></div>';return}
    items.forEach(it=>{
      const div=document.createElement('div'); div.className='p-card';
      const img=document.createElement('img'); img.src='/icons/'+((it.product||'market').toLowerCase().replace(/\s+/g,'-'))+'.png'; img.onerror=function(){this.onerror=null;this.src='/icons/market.png'};img.alt=it.product||'';
      const body=document.createElement('div'); body.className='p-card-body';
      const name=document.createElement('strong'); name.textContent=it.product||''; name.className='product-title'; name.setAttribute('data-product-name',it.product||''); name.style.cssText='color:#f1f5f9;font-size:15px;font-weight:600';
      const price=document.createElement('div'); price.style.cssText='color:#34d399;font-weight:700;font-size:20px'; price.textContent='\u20B9'+(it.price||'0');
      const meta=document.createElement('div'); meta.style.cssText='color:#64748b;font-size:12px'; meta.innerHTML='<i class="fa-solid fa-weight-hanging fa-xs"></i> '+(it.quantity||'')+' kg \u2022 <i class="fa-solid fa-user fa-xs"></i> '+(it.seller||'anon');
      const btn=document.createElement('button'); btn.className='p-buy-btn'; btn.innerHTML='<i class="fa-solid fa-cart-plus"></i>Add to Cart';
      btn.addEventListener('click',()=>{try{window.addToCart(it,true)}catch(e){try{window.addToCart(it)}catch(e){}}});
      body.appendChild(name); body.appendChild(price); body.appendChild(meta); body.appendChild(btn);
      div.appendChild(img); div.appendChild(body);
      el.appendChild(div);
    });
    try{if(typeof ensureI18nLoaded==='function')ensureI18nLoaded(function(){try{if(typeof applyTranslations==='function')applyTranslations();}catch(e){}});}catch(e){}
  }

  function doSearch(){
    const raw=document.getElementById('q').value||'';
    const mapped=(typeof window.localizedToCanonical==='function')?window.localizedToCanonical(raw):raw;
    loadProducts(mapped);
  }
  function filter(cat){
    const mapped=(typeof window.localizedToCanonical==='function')?window.localizedToCanonical(cat):cat;
    loadProducts(mapped);
  }
  document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}});
  loadProducts();
</script>
<script>
  (function(){
    try{
      const vb=document.getElementById('buy-voice-btn');
      if(!vb) return;
      if(!(('webkitSpeechRecognition' in window)||('SpeechRecognition' in window))){vb.style.display='none';return;}
      const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
      const rec=new SpeechRec();
      const speechLangMap=(k)=>({'en':'en-IN','hi':'hi-IN','ta':'ta-IN','kn':'kn-IN','ml':'ml-IN'})[k]||k;
      const setRecLang=()=>{rec.lang=speechLangMap(localStorage.getItem('agri_lang')||'en')};
      setRecLang(); rec.interimResults=false; rec.maxAlternatives=1;
      vb.addEventListener('click',()=>{try{setRecLang();rec.start();vb.innerHTML='<i class="fa-solid fa-microphone-lines" style="color:#34d399"></i>'}catch(e){}});
      rec.onresult=(ev)=>{try{const t=ev.results[0][0].transcript;document.getElementById('q').value=t;doSearch();vb.innerHTML='<i class="fa-solid fa-microphone"></i>'}catch(e){}};
      rec.onerror=()=>{vb.innerHTML='<i class="fa-solid fa-microphone"></i>'};
      window.addEventListener('storage',(ev)=>{if(ev.key==='agri_lang'){try{setRecLang();}catch(e){}}});
    }catch(e){}
  })();
</script>
</body>
</html>
