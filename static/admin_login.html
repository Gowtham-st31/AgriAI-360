<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriAI-360 | Admin Login</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    @keyframes blob{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.9)}100%{transform:translate(0,0) scale(1)}}
    .animate-blob{animation:blob 7s infinite}.delay-2s{animation-delay:2s}.delay-4s{animation-delay:4s}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex items-center justify-center relative overflow-hidden">

<div class="fixed top-0 left-10 w-96 h-96 bg-emerald-600 rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob pointer-events-none"></div>
<div class="fixed top-0 right-10 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob delay-2s pointer-events-none"></div>
<div class="fixed -bottom-32 left-1/2 w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-blob delay-4s pointer-events-none"></div>

<div class="glass-panel rounded-3xl p-10 w-full max-w-md mx-4 relative z-10">
  <div class="flex items-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-blue-500 flex items-center justify-center text-white text-lg shadow-lg shadow-emerald-500/30">
      <i class="fa-solid fa-shield-halved"></i>
    </div>
    <div>
      <div class="font-bold text-white text-lg leading-tight">Agri<span class="gradient-text">AI-360</span></div>
      <div class="text-xs text-slate-500 font-medium uppercase tracking-wider">Admin Console</div>
    </div>
  </div>

  <h1 class="text-2xl font-bold text-white mb-1">Sign in</h1>
  <p class="text-slate-400 text-sm mb-7">Use your admin credentials to continue.</p>

  <div class="flex flex-col gap-4">
    <div>
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Username</label>
      <input id="username" placeholder="Enter username" class="agri-input w-full px-4 py-3 rounded-xl text-sm">
    </div>
    <div>
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Password</label>
      <input id="password" type="password" placeholder="Enter password" class="agri-input w-full px-4 py-3 rounded-xl text-sm">
    </div>

    <button onclick="login()" class="mt-2 w-full py-3.5 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold text-sm shadow-lg shadow-emerald-500/30 hover:shadow-emerald-500/50 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>

    <p id="msg" class="hidden text-red-400 text-sm text-center bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></p>
  </div>
</div>

<script>
function login() {
    fetch("/admin/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            window.location.href = "/admin/dashboard";
        } else {
            const m = document.getElementById("msg");
            m.textContent = d.message || 'Login failed';
            m.classList.remove('hidden');
        }
    });
}
document.getElementById('password').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
