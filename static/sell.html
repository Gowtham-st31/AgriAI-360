<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Sell</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;font-family:'Poppins',sans-serif;transition:border-color .2s,box-shadow .2s;width:100%;padding:10px 14px;border-radius:12px;font-size:14px;outline:none}
    .agri-input:focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    @media(max-width:640px){
      .sell-grid{grid-template-columns:1fr !important}
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<script src="/theme.js"></script>
<div id="site-header"></div>
<script src="/header.js"></script>

<main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight"><i class="fa-solid fa-store mr-2 text-emerald-400"></i>Sell <span class="gradient-text">Your Produce</span></h1>
    <p class="mt-1 text-slate-400 text-sm"><i class="fa-solid fa-circle-info fa-xs mr-1"></i>Listings require admin approval before appearing on the marketplace.</p>
  </div>

  <div class="glass-panel rounded-3xl p-6 sm:p-8">
    <!-- Product Info -->
    <h2 class="text-base font-semibold text-slate-300 mb-4 flex items-center gap-2"><i class="fa-solid fa-box text-emerald-400 fa-sm"></i>Product Details</h2>
    <div class="grid grid-cols-2 gap-3 sell-grid">
      <div>
        <label class="text-xs text-slate-500 mb-1 block">Product Name</label>
        <input id="product" class="agri-input" placeholder="e.g. Tomato">
      </div>
      <div>
        <label class="text-xs text-slate-500 mb-1 block">Quantity (kg)</label>
        <input id="quantity" class="agri-input" placeholder="e.g. 50">
      </div>
    </div>

    <!-- Image Upload -->
    <div class="mt-4 flex flex-wrap gap-4 items-start">
      <div class="flex-1 min-w-[200px]">
        <label class="text-xs text-slate-500 mb-1 block"><i class="fa-solid fa-image fa-xs mr-1"></i>Product Image (PNG)</label>
        <input id="product-image" type="file" accept="image/png" class="text-slate-400 text-sm">
      </div>
      <div class="flex-shrink-0">
        <img id="product-image-preview" src="" alt="preview" class="max-w-[180px] hidden rounded-xl" style="border:1px solid rgba(255,255,255,.1)">
      </div>
    </div>

    <hr class="border-0 my-5" style="border-top:1px solid rgba(255,255,255,.08)">

    <!-- Contact Details -->
    <h2 class="text-base font-semibold text-slate-300 mb-4 flex items-center gap-2"><i class="fa-solid fa-address-card text-blue-400 fa-sm"></i>Contact Details</h2>
    <div class="grid grid-cols-2 gap-3 sell-grid">
      <input id="seller-contact-email" class="agri-input" placeholder="Seller email">
      <input id="buyer-name" class="agri-input" placeholder="Your name">
      <input id="buyer-phone" class="agri-input" placeholder="Phone number">
      <input id="buyer-location" class="agri-input" placeholder="Your location">
      <input id="price" class="agri-input" placeholder="Price per kg">
      <input id="location" class="agri-input" placeholder="Location / Market">
    </div>
    <div class="mt-3">
      <textarea id="notes" class="agri-input" placeholder="Additional notes" style="min-height:80px;resize:vertical"></textarea>
    </div>

    <!-- Actions -->
    <div class="mt-5 flex flex-wrap gap-3">
      <button onclick="postListing()" class="px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2">
        <i class="fa-solid fa-paper-plane"></i> Post Listing
      </button>
      <button onclick="clearForm()" class="px-4 py-3 rounded-xl text-sm font-medium text-slate-400 flex items-center gap-2 transition-colors hover:text-white" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)">
        <i class="fa-solid fa-eraser"></i> Clear
      </button>
      <button onclick="contactSellerFromForm()" class="px-4 py-3 rounded-xl text-sm font-medium text-slate-400 flex items-center gap-2 transition-colors hover:text-white" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)">
        <i class="fa-solid fa-envelope"></i> Message Seller
      </button>
    </div>
  </div>

  <div id="result" class="mt-4"></div>
</main>

<script>
function clearForm(){
  ['product','quantity','price','location','notes'].forEach(id=>{try{document.getElementById(id).value=''}catch(e){}});
  try{const f=document.getElementById('product-image');if(f){f.value=null;}const p=document.getElementById('product-image-preview');if(p){p.src='';p.style.display='none';}}catch(e){}
}

try{
  const imgInput=document.getElementById('product-image');
  if(imgInput){
    imgInput.addEventListener('change',function(){
      try{
        const f=this.files&&this.files[0];
        const preview=document.getElementById('product-image-preview');
        if(!f){if(preview){preview.src='';preview.style.display='none'}return}
        if(f.type!=='image/png'){alert('Please upload a PNG image');this.value='';if(preview){preview.src='';preview.style.display='none'}return}
        const url=URL.createObjectURL(f);
        if(preview){preview.src=url;preview.style.display='block';}
      }catch(e){console.error(e)}
    });
  }
}catch(e){}

async function postListing(){
  const data={product:(document.getElementById('product').value||'').trim(),quantity:document.getElementById('quantity').value,price:document.getElementById('price').value,location:document.getElementById('location').value,notes:document.getElementById('notes').value};
  if(!data.product||!data.quantity||!data.price){document.getElementById('result').innerHTML='<div class="glass-panel rounded-xl p-3 text-sm text-red-400" style="border-color:rgba(239,68,68,.2)"><i class="fa-solid fa-triangle-exclamation mr-1.5"></i>Please fill product, quantity and price.</div>';return}
  try{
    const fileInput=document.getElementById('product-image');
    const file=(fileInput&&fileInput.files&&fileInput.files[0])?fileInput.files[0]:null;
    let res,j;
    if(file){
      if(file.type!=='image/png'){document.getElementById('result').innerHTML='<div class="glass-panel rounded-xl p-3 text-sm text-red-400" style="border-color:rgba(239,68,68,.2)"><i class="fa-solid fa-triangle-exclamation mr-1.5"></i>Please upload a PNG image.</div>';return;}
      const form=new FormData();
      form.append('product',data.product);form.append('quantity',data.quantity);form.append('price',data.price);form.append('location',data.location||'');form.append('notes',data.notes||'');form.append('image',file,file.name);
      res=await fetch('/api/marketplace',{method:'POST',body:form,credentials:'include'});
      try{j=await res.json();}catch(e){j={success:false,message:'Invalid server response'}}
    }else{
      res=await fetch('/api/marketplace',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data),credentials:'include'});
      j=await res.json();
    }
    if(j.success){document.getElementById('result').innerHTML='<div class="glass-panel rounded-xl p-4 text-sm text-emerald-400" style="border-color:rgba(16,185,129,.2)"><i class="fa-solid fa-clock mr-1.5"></i>Listing submitted! It will appear on the marketplace once approved by admin.</div>';clearForm();}
    else{document.getElementById('result').innerHTML='<div class="glass-panel rounded-xl p-3 text-sm text-red-400" style="border-color:rgba(239,68,68,.2)"><i class="fa-solid fa-xmark mr-1.5"></i>Failed to post listing.</div>'}
  }catch(e){console.error(e);document.getElementById('result').innerHTML='<div class="glass-panel rounded-xl p-3 text-sm text-red-400" style="border-color:rgba(239,68,68,.2)">Server error.</div>'}
}

(function prefill(){
  try{
    const params=new URLSearchParams(window.location.search);
    const contact=params.get('contact');const product=params.get('product');
    if(contact) document.getElementById('seller-contact-email').value=contact;
    if(product) document.getElementById('product').value=product;
    const profile=JSON.parse(localStorage.getItem('agri_profile')||'{}');
    if(profile){if(profile.name)document.getElementById('buyer-name').value=profile.name;if(profile.phone)document.getElementById('buyer-phone').value=profile.phone;if(profile.city)document.getElementById('buyer-location').value=(profile.city+(profile.pincode?(' - '+profile.pincode):''));}
  }catch(e){}
})();

function contactSellerFromForm(){
  try{
    const seller=document.getElementById('seller-contact-email').value.trim();
    const name=document.getElementById('buyer-name').value.trim();
    const phone=document.getElementById('buyer-phone').value.trim();
    const location=document.getElementById('buyer-location').value.trim();
    const product=document.getElementById('product').value.trim();
    if(!seller){alert('Seller contact required');return}
    const subject=encodeURIComponent('Inquiry about '+(product||'your listing'));
    const body=encodeURIComponent('Hello,%0A%0AI am '+(name||'')+' (phone: '+(phone||'')+').%0A%0AI am interested in '+(product||'your product')+'.%0A%0AMy location: '+(location||'')+'%0A%0ARegards');
    window.location.href='mailto:'+seller+'?subject='+subject+'&body='+body;
  }catch(e){alert('Unable to send message')}
}
</script>
</body>
</html>
