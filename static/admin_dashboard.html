<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriAI-360 | Admin Dashboard</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .nav-card{transition:all .2s}
    .nav-card:hover{transform:translateY(-2px);border-color:rgba(16,185,129,.4)!important;box-shadow:0 8px 30px rgba(16,185,129,.1)}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<div id="admin-nav-placeholder"></div>
<script src="/admin-header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Admin <span class="gradient-text">Dashboard</span></h1>
    <p class="mt-1 text-slate-400 text-sm">Manage marketplace data, orders, and featured deals.</p>
  </div>

  <!-- Nav cards -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
    <a href="/admin/orders" class="glass-panel nav-card rounded-2xl p-5 flex flex-col items-center gap-3 text-center no-underline">
      <div class="w-11 h-11 rounded-xl bg-emerald-500/15 flex items-center justify-center text-emerald-400 text-xl"><i class="fa-solid fa-receipt"></i></div>
      <span class="text-sm font-semibold text-slate-200">Orders</span>
    </a>
    <a href="/admin/products" class="glass-panel nav-card rounded-2xl p-5 flex flex-col items-center gap-3 text-center no-underline">
      <div class="w-11 h-11 rounded-xl bg-blue-500/15 flex items-center justify-center text-blue-400 text-xl"><i class="fa-solid fa-box"></i></div>
      <span class="text-sm font-semibold text-slate-200">Products</span>
    </a>
    <a href="/admin/commodities" class="glass-panel nav-card rounded-2xl p-5 flex flex-col items-center gap-3 text-center no-underline">
      <div class="w-11 h-11 rounded-xl bg-purple-500/15 flex items-center justify-center text-purple-400 text-xl"><i class="fa-solid fa-layer-group"></i></div>
      <span class="text-sm font-semibold text-slate-200">Commodities</span>
    </a>
    <a href="/admin/diseases" class="glass-panel nav-card rounded-2xl p-5 flex flex-col items-center gap-3 text-center no-underline">
      <div class="w-11 h-11 rounded-xl bg-amber-500/15 flex items-center justify-center text-amber-400 text-xl"><i class="fa-solid fa-stethoscope"></i></div>
      <span class="text-sm font-semibold text-slate-200">Diseases</span>
    </a>
    <a href="/admin/analytics" class="glass-panel nav-card rounded-2xl p-5 flex flex-col items-center gap-3 text-center no-underline">
      <div class="w-11 h-11 rounded-xl bg-rose-500/15 flex items-center justify-center text-rose-400 text-xl"><i class="fa-solid fa-chart-bar"></i></div>
      <span class="text-sm font-semibold text-slate-200">Analytics</span>
    </a>
  </div>

  <!-- Today's Deals Manager -->
  <div class="glass-panel rounded-3xl p-8">
    <h2 class="text-xl font-semibold text-white flex items-center gap-3 mb-1">
      <i class="fa-solid fa-fire text-amber-400"></i> Today's Deals
    </h2>
    <p class="text-slate-400 text-sm mb-6">Add or remove listings featured on the home page.</p>

    <div class="flex gap-3 mb-6">
      <input id="deal_id" placeholder="Listing ID (e.g. 1764399303396)" class="agri-input flex-1 px-4 py-3 rounded-xl text-sm font-['Poppins']">
      <button id="add_deal" class="px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-plus fa-sm"></i> Add Deal
      </button>
    </div>

    <div id="deals_list">
      <div class="text-slate-500 text-sm italic">Loading deals…</div>
    </div>
  </div>

  <!-- Pending Listings Approval -->
  <div class="glass-panel rounded-3xl p-8 mt-6">
    <h2 class="text-xl font-semibold text-white flex items-center gap-3 mb-1">
      <i class="fa-solid fa-clock text-orange-400"></i> Pending Listings
      <span id="pending_badge" class="inline-flex items-center justify-center min-w-[22px] h-[22px] rounded-full bg-orange-500/20 text-orange-400 text-xs font-bold px-1.5">0</span>
    </h2>
    <p class="text-slate-400 text-sm mb-6">Review new seller listings and pending price change requests.</p>
    <div id="pending_list">
      <div class="text-slate-500 text-sm italic">Loading…</div>
    </div>
  </div>
</main>

<script>
async function refreshDeals(){
    const box = document.getElementById('deals_list');
    try{
        const r = await fetch('/admin/api/today_deals', {credentials:'include'});
        if(r.status === 401 || r.status === 403){
            box.innerHTML = '<div class="text-slate-500 text-sm">Session expired. <a href="/admin/login" class="text-emerald-400 hover:underline">Login</a></div>';
            return;
        }
        const j = await r.json();
        if(!j.success){ box.innerHTML = '<div class="text-slate-500 text-sm">Failed to load: '+(j.message||'')+'</div>'; return }
        const ids = j.ids || [];
        const items = j.items || [];
        if(ids.length===0){ box.innerHTML = '<div class="text-slate-500 text-sm italic">No deals marked yet.</div>'; return }
        box.innerHTML = '<div class="flex flex-col gap-3">' + ids.map(id=>{
            const it = (items||[]).find(x=>x.id==id) || {};
            return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)">
                <div>
                  <div style="font-weight:600;color:#e2e8f0;font-size:14px">${it.product||'ID '+id}</div>
                  <div style="font-size:12px;color:#64748b;margin-top:2px">${it.quantity||''} kg • ₹${it.price||''}</div>
                </div>
                <button onclick="removeDeal(${id})" style="padding:6px 14px;border-radius:8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.25);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap"><i class="fa-solid fa-trash fa-xs"></i> Remove</button>
            </div>`;
        }).join('') + '</div>';
    }catch(e){ box.innerHTML = '<div class="text-slate-500 text-sm">Could not load deals.</div>' }
}

async function addDeal(){
    const v = document.getElementById('deal_id').value.trim();
    if(!v) return alert('Enter listing id');
    try{
        const r = await fetch('/admin/api/today_deals', {method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'add', id: v})});
        const j = await r.json();
        if(j.success){ document.getElementById('deal_id').value=''; refreshDeals(); } else alert('Failed: '+(j.message||''));
    }catch(e){ alert('Request failed') }
}

async function removeDeal(id){
    try{
        const r = await fetch('/admin/api/today_deals', {method:'DELETE', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'remove', id: id})});
        const j = await r.json();
        if(j.success){ refreshDeals(); } else alert('Failed: '+(j.message||''));
    }catch(e){ alert('Request failed') }
}

document.getElementById('add_deal').addEventListener('click', addDeal);
refreshDeals();

function escapeHtml(value){
  const div = document.createElement('div');
  div.textContent = value == null ? '' : String(value);
  return div.innerHTML;
}

function getListingImage(item){
  const icon = (item && item.icon ? String(item.icon).trim() : '');
  if(icon) return icon.startsWith('/') || /^https?:\/\//i.test(icon) || /^data:/i.test(icon) ? icon : ('/icons/' + icon.replace(/^\/+/, ''));
  return '/icons/market.png';
}

function renderPendingMeta(it){
  const reviewType = (it.review_type || 'new-listing').toLowerCase();
  if(reviewType === 'price-change'){
    const req = it.price_change_request || {};
    const reason = req.reason ? `<div style="font-size:12px;color:#94a3b8;margin-top:4px">Reason: ${escapeHtml(req.reason)}</div>` : '';
    return `
      <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#64748b;margin-top:2px">
      <span>Current Price: <span style="color:#cbd5e1">₹${escapeHtml(it.price || '')}</span></span>
      <span>Requested Price: <span style="color:#fbbf24">₹${escapeHtml(req.requested_price || '')}</span></span>
      <span>By: ${escapeHtml(it.user || 'anon')}</span>
      </div>
      ${reason}
    `;
  }

  return `<div style="font-size:12px;color:#64748b;margin-top:2px">${escapeHtml(it.quantity || '')} kg &bull; ₹${escapeHtml(it.price || '')} &bull; By: ${escapeHtml(it.user || 'anon')}</div>`;
}

function renderPendingLabel(it){
  const reviewType = (it.review_type || 'new-listing').toLowerCase();
  if(reviewType === 'price-change'){
    return '<span style="display:inline-flex;align-items:center;gap:6px;margin-bottom:6px;padding:4px 9px;border-radius:999px;background:rgba(245,158,11,.12);color:#fbbf24;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase"><i class="fa-solid fa-indian-rupee-sign fa-xs"></i>Price Change Request</span>';
  }
  return '<span style="display:inline-flex;align-items:center;gap:6px;margin-bottom:6px;padding:4px 9px;border-radius:999px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase"><i class="fa-solid fa-box-open fa-xs"></i>New Listing</span>';
}

// Pending Listings Approval
async function refreshPending(){
    const box = document.getElementById('pending_list');
    try{
        const r = await fetch('/admin/api/pending_listings', {credentials:'include'});
        const j = await r.json();
        if(!j.success){ box.innerHTML = '<div class="text-slate-500 text-sm">Failed to load.</div>'; return }
        const items = j.listings || [];
        const badge = document.getElementById('pending_badge');
        if(badge) badge.textContent = items.length;
        if(items.length===0){ box.innerHTML = '<div class="text-slate-500 text-sm italic">No pending listings.</div>'; return }
        box.innerHTML = '<div class="flex flex-col gap-3">' + items.map(it=>{
            const reviewType = (it.review_type || 'new-listing').toLowerCase();
            const title = reviewType === 'price-change'
              ? `${escapeHtml(it.product||'Unknown')} <span style="color:#fbbf24;font-size:12px;font-weight:700">Requested price update</span>`
              : escapeHtml(it.product||'Unknown');
            return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)">
                <div style="display:flex;align-items:flex-start;gap:12px;flex:1">
                  <img src="${escapeHtml(getListingImage(it))}" alt="${escapeHtml(it.product||'product')}" style="width:56px;height:56px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);flex-shrink:0" onerror="this.onerror=null;this.src='/icons/market.png'">
                  <div style="flex:1">
                  ${renderPendingLabel(it)}
                  <div style="font-weight:600;color:#e2e8f0;font-size:14px">${title}</div>
                  ${renderPendingMeta(it)}
                  </div>
                </div>
                <div style="display:flex;gap:8px">
                  <button onclick="approveListing(${it.id})" style="padding:6px 14px;border-radius:8px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399;font-size:12px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap"><i class="fa-solid fa-check fa-xs"></i> Approve</button>
                  <button onclick="rejectListing(${it.id})" style="padding:6px 14px;border-radius:8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.25);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap"><i class="fa-solid fa-xmark fa-xs"></i> Reject</button>
                </div>
            </div>`;
        }).join('') + '</div>';
    }catch(e){ box.innerHTML = '<div class="text-slate-500 text-sm">Could not load pending listings.</div>' }
}
async function approveListing(id){
    try{
        const r = await fetch('/admin/api/listing/'+id+'/approve', {method:'POST', credentials:'include'});
        const j = await r.json();
        if(j.success) refreshPending(); else alert('Failed: '+(j.message||''));
    }catch(e){ alert('Request failed') }
}
async function rejectListing(id){
  if(!confirm('Reject this pending request?')) return;
    try{
        const r = await fetch('/admin/api/listing/'+id+'/reject', {method:'POST', credentials:'include'});
        const j = await r.json();
        if(j.success) refreshPending(); else alert('Failed: '+(j.message||''));
    }catch(e){ alert('Request failed') }
}
refreshPending();
</script>
</body>
</html>
