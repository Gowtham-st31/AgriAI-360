<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Market Price</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;font-family:'Poppins',sans-serif;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .sort-btn{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .sort-btn:hover{border-color:rgba(16,185,129,.4);color:#34d399;background:rgba(16,185,129,.08)}
    .market-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid #10b981;transition:border-color .15s}
    .market-card:hover{border-color:rgba(16,185,129,.4)}
    .market-card p{margin:4px 0;font-size:13px;color:#cbd5e1}
    .market-card b.label{color:#64748b;font-weight:500}
    .market-card .value{color:#f1f5f9;font-weight:600}
    .ai-card{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:14px;padding:16px;margin-bottom:16px}
    .ai-card p{margin:4px 0;font-size:13px;color:#cbd5e1}
    @media(max-width:640px){
      .search-row{flex-direction:column !important}
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<script src="/theme.js"></script>
<div id="site-header"></div>
<script src="/header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight"><i class="fa-solid fa-chart-line mr-2 text-emerald-400"></i>Market <span class="gradient-text">Prices</span></h1>
    <p class="mt-1 text-slate-400 text-sm" data-i18n="market.title">Check real-time commodity prices across markets.</p>
  </div>

  <!-- Search -->
  <div class="glass-panel rounded-2xl p-5 mb-5">
    <div class="flex gap-3 items-stretch search-row" style="flex-direction:row">
      <div class="relative flex-1">
        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
        <input id="commodityInput" class="agri-input w-full pl-9 pr-4 py-3 rounded-xl text-sm" placeholder="Enter commodity (Tomato, Banana, Onion...)" data-i18n="search.placeholder">
      </div>
      <button id="get-price-btn" onclick="getPrice()" class="px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap" data-i18n="market.get">
        <i class="fa-solid fa-magnifying-glass-dollar"></i> Get Prices
      </button>
    </div>
  </div>

  <!-- Sort Buttons -->
  <div class="flex flex-wrap gap-2 mb-5">
    <button class="sort-btn" onclick="sortData('high')" data-i18n="market.sort.high"><i class="fa-solid fa-arrow-up fa-xs"></i>Highest Price</button>
    <button class="sort-btn" onclick="sortData('low')" data-i18n="market.sort.low"><i class="fa-solid fa-arrow-down fa-xs"></i>Lowest Price</button>
    <button class="sort-btn" onclick="sortNearest()" data-i18n="market.sort.near"><i class="fa-solid fa-location-dot fa-xs"></i>Nearest Market</button>
  </div>

  <!-- AI Box -->
  <div id="aiBox"></div>

  <!-- Results -->
  <div class="glass-panel rounded-2xl p-6">
    <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-4" data-i18n="market.data"><i class="fa-solid fa-database text-blue-400 fa-sm"></i>Market Data</h2>
    <div id="resultBox" class="text-slate-500 text-sm italic">Enter a commodity name and click Get Prices.</div>
  </div>
</main>

<script>
let MARKET_DATA = [];

function getPrice() {
    const raw = document.getElementById("commodityInput").value.trim();
    const c = (typeof window.localizedToCanonical === 'function') ? window.localizedToCanonical(raw) : raw;
    if (!c) { alert("Enter a commodity name!"); return; }

    document.getElementById("resultBox").innerHTML = '<div class="text-slate-500 text-sm">Loading...</div>';
    document.getElementById("aiBox").innerHTML = "";

    fetch('/price?commodity='+encodeURIComponent(c)+'&ai=1')
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                document.getElementById("resultBox").innerHTML = '<div class="text-red-400 text-sm">'+(data.msg || "Could not load data")+'</div>';
                return;
            }
            MARKET_DATA = data.data;
            displayAiSummary(data.ai);
            displayResults(MARKET_DATA);
        })
        .catch(err => {
            document.getElementById("resultBox").innerHTML = '<div class="text-red-400 text-sm">Could not connect to server</div>';
        });
}

function displayAiSummary(ai) {
    const box = document.getElementById('aiBox');
    if (!box) return;
    if (!ai) { box.innerHTML = ""; return; }

    if (ai.enabled !== true) {
        const reason = ai.reason || 'AI summary unavailable';
        box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">AI Summary:</b> '+reason+'</p></div>';
        return;
    }

    const parsed = ai.parsed || null;
    if (!parsed || typeof parsed !== 'object') {
        box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">AI Summary:</b> Could not parse model response</p></div>';
        return;
    }

    const price = parsed.recommended_modal_price;
    const currency = parsed.currency || 'INR';
    const unit = parsed.unit || '100kg';
    const rationale = parsed.rationale || '';
    const corrected = parsed.commodity_corrected || '';

    if (price === undefined || price === null || price === '') {
        box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">AI Summary:</b> No recommended price returned</p></div>';
        return;
    }

    let correctedHtml = '';
    if (corrected) {
        const raw = document.getElementById('commodityInput').value.trim();
        if (corrected.toLowerCase() !== raw.toLowerCase()) {
            correctedHtml = '<p><b class="text-emerald-400">Did you mean:</b> <span class="text-white font-semibold">'+corrected+'</span></p>';
        }
    }

    box.innerHTML = '<div class="ai-card">'+correctedHtml+'<p><b class="text-emerald-400">AI Recommended Price:</b> <span class="text-white font-bold">'+(currency === 'INR' ? '\u20B9' : '')+price+' / '+unit+'</span></p>'+(rationale ? '<p><b class="text-emerald-400">Why:</b> '+rationale+'</p>' : '')+'</div>';
}

function displayResults(data) {
    let html = "";
    if (data.length === 0) { html = '<div class="text-slate-500 text-sm italic">No data available for this commodity.</div>'; }

    data.forEach(m => {
        html += '<div class="market-card">'
            +'<p data-label="market"><b class="label">'+(window.__t&&window.__t('label.market')||'Market:')+'</b> <span class="value">'+m.market+'</span></p>'
            +'<p data-label="district"><b class="label">'+(window.__t&&window.__t('label.district')||'District:')+'</b> <span class="value">'+m.district+'</span></p>'
            +'<p data-label="state"><b class="label">'+(window.__t&&window.__t('label.state')||'State:')+'</b> <span class="value">'+m.state+'</span></p>'
            +'<p data-label="variety"><b class="label">'+(window.__t&&window.__t('label.variety')||'Variety:')+'</b> <span class="value">'+(m.variety||"N/A")+'</span></p>'
            +'<p data-label="grade"><b class="label">'+(window.__t&&window.__t('label.grade')||'Grade:')+'</b> <span class="value">'+(m.grade||"N/A")+'</span></p>'
            +'<p data-label="min_price"><b class="label">'+(window.__t&&window.__t('label.min_price')||'Min Price:')+'</b> <span class="value text-emerald-400">\u20B9'+m.min_price+' / 100kg</span></p>'
            +'<p data-label="max_price"><b class="label">'+(window.__t&&window.__t('label.max_price')||'Max Price:')+'</b> <span class="value text-emerald-400">\u20B9'+m.max_price+' / 100kg</span></p>'
            +'<p data-label="modal_price"><b class="label">'+(window.__t&&window.__t('label.modal_price')||'Modal Price:')+'</b> <span class="value text-white font-bold">\u20B9'+m.modal_price+' / 100kg</span></p>'
            +'<p data-label="date"><b class="label">'+(window.__t&&window.__t('label.date')||'Date:')+'</b> <span class="value">'+m.arrival_date+'</span></p>'
            +'</div>';
    });

    document.getElementById("resultBox").innerHTML = html;
    try{ if(typeof ensureI18nLoaded === 'function') ensureI18nLoaded(function(){ try{ if(typeof applyTranslations === 'function') applyTranslations(); }catch(e){} }); }catch(e){}
}

function sortData(type) {
    if (type === "high") MARKET_DATA.sort((a, b) => b.modal_price - a.modal_price);
    else MARKET_DATA.sort((a, b) => a.modal_price - b.modal_price);
    displayResults(MARKET_DATA);
}

function sortNearest() {
    if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        MARKET_DATA.sort((a, b) => {
            const dA = (a.lat && a.lon) ? haversine(lat, lon, a.lat, a.lon) : 99999;
            const dB = (b.lat && b.lon) ? haversine(lat, lon, b.lat, b.lon) : 99999;
            return dA - dB;
        });
        displayResults(MARKET_DATA);
    }, () => { alert('Location access denied'); });
}

// Enter key support
document.getElementById('commodityInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();getPrice();}});

// Auto-search from URL params
(function(){
  try{
    const params=new URLSearchParams(window.location.search);
    const q=params.get('q');
    if(q){document.getElementById('commodityInput').value=q;getPrice();}
  }catch(e){}
})();
</script>
</body>
</html>
