<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Market Price</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;font-family:'Poppins',sans-serif;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .sort-btn{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .sort-btn:hover{border-color:rgba(16,185,129,.4);color:#34d399;background:rgba(16,185,129,.08)}
    .market-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid #10b981;transition:border-color .15s}
    .market-card:hover{border-color:rgba(16,185,129,.4)}
    .market-card p{margin:4px 0;font-size:13px;color:#cbd5e1}
    .market-card b.label{color:#64748b;font-weight:500}
    .market-card .value{color:#f1f5f9;font-weight:600}
    .ai-card{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:14px;padding:16px;margin-bottom:16px}
    .ai-card p{margin:4px 0;font-size:13px;color:#cbd5e1}
    .meta-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#e2e8f0}
    .fresh-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em}
    .fresh-badge.fresh{background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.4);color:#6ee7b7}
    .fresh-badge.old{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
    @media(max-width:640px){
      .search-row{flex-direction:column !important}
    }

    /* Improve native select dropdown readability (options inherit agri-input color). */
    select.agri-input{color-scheme:dark}
    select.agri-input option{background:rgb(15,23,42);color:#f1f5f9}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<script src="/theme.js"></script>
<div id="site-header"></div>
<script src="/header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight"><i class="fa-solid fa-chart-line mr-2 text-emerald-400"></i>Market <span class="gradient-text">Prices</span></h1>
    <p class="mt-1 text-slate-400 text-sm" data-i18n="market.title">Check real-time commodity prices across markets.</p>
  </div>

  <!-- Search -->
  <div class="glass-panel rounded-2xl p-5 mb-5">
    <!-- Filters -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3 mb-4">
      <div class="lg:col-span-1">
        <label class="block text-xs text-slate-400 mb-1">From Date</label>
        <input type="date" id="from_date" class="agri-input w-full px-3 py-2 rounded-xl text-sm">
      </div>
      <div class="lg:col-span-1">
        <label class="block text-xs text-slate-400 mb-1">To Date</label>
        <input type="date" id="to_date" class="agri-input w-full px-3 py-2 rounded-xl text-sm">
      </div>
      <div class="lg:col-span-2">
        <label class="block text-xs text-slate-400 mb-1">State</label>
        <select id="state" class="agri-input w-full px-3 py-2 rounded-xl text-sm">
          <option value="">All States</option>
        </select>
      </div>
      <div class="lg:col-span-2">
        <label class="block text-xs text-slate-400 mb-1">District</label>
        <select id="district" class="agri-input w-full px-3 py-2 rounded-xl text-sm">
          <option value="">All Districts</option>
        </select>
      </div>
      <div class="lg:col-span-6 flex flex-wrap gap-2">
        <button type="button" id="todayBtn" class="sort-btn" onclick="setTodayRange()">Today</button>
        <button type="button" id="useLocationBtn" class="sort-btn" onclick="useMyLocation()">📍 Use My Location</button>
        <span id="locationMeta" class="text-xs text-slate-400"></span>
      </div>
    </div>

    <div class="flex gap-3 items-stretch search-row" style="flex-direction:row">
      <div class="relative flex-1">
        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
        <input id="commodityInput" class="agri-input w-full pl-9 pr-4 py-3 rounded-xl text-sm" placeholder="Enter commodity (Tomato, Banana, Onion...)" data-i18n="search.placeholder" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off">
      </div>
      <button id="get-price-btn" onclick="getPrice()" class="px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap" data-i18n="market.get">
        <i class="fa-solid fa-magnifying-glass-dollar" id="get-price-btn-icon"></i>
        <span id="get-price-btn-text">Get Prices</span>
      </button>
    </div>
  </div>

  <!-- Sort Buttons -->
  <div class="flex flex-wrap gap-2 mb-5">
    <button class="sort-btn" onclick="sortData('high')" data-i18n="market.sort.high"><i class="fa-solid fa-arrow-up fa-xs"></i>Highest Price</button>
    <button class="sort-btn" onclick="sortData('low')" data-i18n="market.sort.low"><i class="fa-solid fa-arrow-down fa-xs"></i>Lowest Price</button>
    <button class="sort-btn" onclick="sortNearest()" data-i18n="market.sort.near"><i class="fa-solid fa-location-dot fa-xs"></i>Nearest Market</button>
  </div>

  <!-- AI Box -->
  <div id="updateMeta" class="mb-3"></div>
  <div id="searchMeta"></div>
  <div id="aiBox"></div>

  <!-- Results -->
  <div class="glass-panel rounded-2xl p-6">
    <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-4" data-i18n="market.data"><i class="fa-solid fa-database text-blue-400 fa-sm"></i>Market Data</h2>
    <div id="resultBox" class="text-slate-500 text-sm italic">Enter a commodity name and click Get Prices.</div>
  </div>
</main>

<script>
let MARKET_DATA = [];
let LOCATION_DATA = { states: [], districts_by_state: {} };
let CURRENT_LOCATION = null; // { lat, lon }

const KNOWN_COMMODITIES = [
  'Tomato', 'Onion', 'Potato', 'Banana', 'Paddy', 'Maize', 'Cotton',
  'Groundnut', 'Sugarcane', 'Turmeric', 'Chilli', 'Coriander'
];

function normalizeCommodityToken(value) {
  return String(value || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function resolveSingleCommodityInput(raw) {
  const text = String(raw || '').trim();
  if (!text) return { value: '', error: '' };

  const parts = text.split(/[•,;|/\n]+/).map(part => part.trim()).filter(Boolean);
  if (parts.length > 1) {
    return { value: '', error: 'Search one commodity only, for example Banana.' };
  }

  return { value: text, error: '' };
}

function setGetPriceLoading(isLoading) {
  const button = document.getElementById('get-price-btn');
  const icon = document.getElementById('get-price-btn-icon');
  const text = document.getElementById('get-price-btn-text');
  if (!button || !icon || !text) return;

  button.disabled = !!isLoading;
  button.style.opacity = isLoading ? '.75' : '';
  button.style.cursor = isLoading ? 'default' : '';
  icon.className = isLoading ? 'fa-solid fa-circle-notch fa-spin' : 'fa-solid fa-magnifying-glass-dollar';
  text.textContent = isLoading ? 'Fetching latest mandi price...' : 'Get Prices';
}

async function getPrice() {
    const raw = document.getElementById("commodityInput").value.trim();
  const resolvedInput = resolveSingleCommodityInput(raw);
  const c = resolvedInput.value;
  if (resolvedInput.error) {
    document.getElementById("resultBox").innerHTML = '<div class="text-amber-300 text-sm">'+resolvedInput.error+'</div>';
    document.getElementById("aiBox").innerHTML = '';
    document.getElementById("searchMeta").innerHTML = '';
    document.getElementById("updateMeta").innerHTML = '';
    return;
  }
  if (!c) { alert("Enter a commodity name!"); return; }

  setGetPriceLoading(true);
  document.getElementById("resultBox").innerHTML = '<div class="text-slate-500 text-sm">Fetching latest mandi price...</div>';
  document.getElementById("aiBox").innerHTML = "";
  document.getElementById("searchMeta").innerHTML = "";
  document.getElementById("updateMeta").innerHTML = "";

  try {
    const params = new URLSearchParams();
    params.set('commodity', c);
    params.set('ai', '1');

    const fromDate = (document.getElementById('from_date') || {}).value || '';
    const toDate = (document.getElementById('to_date') || {}).value || '';
    const state = (document.getElementById('state') || {}).value || '';
    const district = (document.getElementById('district') || {}).value || '';

    if (fromDate) params.set('from_date', fromDate);
    if (toDate) params.set('to_date', toDate);
    if (state) params.set('state', state);
    if (district) params.set('district', district);
    if (CURRENT_LOCATION && CURRENT_LOCATION.lat != null && CURRENT_LOCATION.lon != null) {
      params.set('lat', String(CURRENT_LOCATION.lat));
      params.set('lon', String(CURRENT_LOCATION.lon));
    }

    const res = await fetch('/price?' + params.toString());
    const data = await res.json();
    if (!data.success) {
      document.getElementById("resultBox").innerHTML = '<div class="text-red-400 text-sm">'+(data.msg || "Could not load data")+'</div>';
      return;
    }
    MARKET_DATA = data.data;
    displayUpdateMeta(data);
    displayResolvedCommodity(data.commodity_meta);
    displayAiSummary(data.ai);
    if (data.variety_not_found === true) {
      document.getElementById("resultBox").innerHTML = '<div class="text-amber-300 text-sm">Variety not found for this commodity.</div>';
      document.getElementById("aiBox").innerHTML = '';
      return;
    }
    displayResults(MARKET_DATA);
  } catch (err) {
    document.getElementById("resultBox").innerHTML = '<div class="text-red-400 text-sm">Could not connect to server</div>';
  } finally {
    setGetPriceLoading(false);
  }
}

function ymdToday() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function setTodayRange() {
  const today = ymdToday();
  const fromEl = document.getElementById('from_date');
  const toEl = document.getElementById('to_date');
  if (fromEl) fromEl.value = today;
  if (toEl) toEl.value = today;
}

function ensureOptionAndSelect(selectEl, value) {
  if (!selectEl) return '';
  const text = String(value || '').trim();
  if (!text) return '';

  let selected = selectOptionBestEffort(selectEl, text);
  if (selected) return selected;

  // If reverse-geocoded value is not in current dropdown, add it so the user
  // still gets auto-filled state/district as requested.
  const opt = document.createElement('option');
  opt.value = text;
  opt.textContent = text;
  selectEl.appendChild(opt);
  selectEl.value = text;
  return selectEl.value;
}

function normalizeLocationText(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/\b(dist\.?|district)\b/g, '')
    .replace(/\s+/g, ' ')
    .replace(/[^a-z0-9 ]+/g, '')
    .trim();
}

function selectOptionBestEffort(selectEl, desiredValue) {
  if (!selectEl) return '';
  const desired = String(desiredValue || '').trim();
  if (!desired) return '';

  // Exact
  selectEl.value = desired;
  if (selectEl.value === desired) return selectEl.value;

  const needle = normalizeLocationText(desired);
  if (!needle) return '';
  const options = Array.from(selectEl.options || []);
  const exactNorm = options.find(o => normalizeLocationText(o.value) === needle);
  if (exactNorm) {
    selectEl.value = exactNorm.value;
    return selectEl.value;
  }
  const contains = options.find(o => normalizeLocationText(o.value).includes(needle) || needle.includes(normalizeLocationText(o.value)));
  if (contains) {
    selectEl.value = contains.value;
    return selectEl.value;
  }
  return '';
}

async function useMyLocation() {
  const meta = document.getElementById('locationMeta');
  if (!navigator.geolocation) {
    if (meta) meta.textContent = 'Geolocation not supported.';
    return;
  }
  if (meta) meta.textContent = 'Detecting location...';
  navigator.geolocation.getCurrentPosition(pos => {
    CURRENT_LOCATION = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    if (meta) meta.textContent = `Using location (${CURRENT_LOCATION.lat.toFixed(4)}, ${CURRENT_LOCATION.lon.toFixed(4)})`;

    // Auto-fill state & district (best-effort)
    (async () => {
      try {
        if (!LOCATION_DATA || !Array.isArray(LOCATION_DATA.states) || LOCATION_DATA.states.length === 0) {
          await initMandiLocations();
        }
        const params = new URLSearchParams({ lat: String(CURRENT_LOCATION.lat), lon: String(CURRENT_LOCATION.lon) });

        let state = '';
        let district = '';
        let reverseError = '';

        // Prefer backend reverse (keeps calls server-side when possible).
        try {
          const res = await fetch('/geo/reverse?' + params.toString());
          const data = await res.json().catch(() => null);
          if (res.ok && data && data.success === true) {
            state = data.state || '';
            district = data.district || '';
          } else {
            reverseError = (data && (data.msg || data.error)) ? String(data.msg || data.error) : `HTTP ${res.status}`;
          }
        } catch (e) {
          reverseError = String(e && e.message ? e.message : e || '').slice(0, 160);
        }

        // Fallback: client-side reverse geocode (helps when server outbound is blocked).
        if (!state && !district) {
          try {
            const nomParams = new URLSearchParams({
              format: 'jsonv2',
              lat: String(CURRENT_LOCATION.lat),
              lon: String(CURRENT_LOCATION.lon),
              zoom: '10',
              addressdetails: '1'
            });
            const res2 = await fetch('https://nominatim.openstreetmap.org/reverse?' + nomParams.toString());
            const jd = await res2.json().catch(() => null);
            const addr = (jd && jd.address) ? jd.address : {};
            state = String(addr.state || addr.region || '').trim();
            district = String(
              addr.state_district ||
              addr.district ||
              addr.county ||
              addr.city_district ||
              ''
            ).trim();
          } catch (e) {
            // ignore
          }
        }

        if (!state && !district) {
          if (meta) {
            const base = `Using location (${CURRENT_LOCATION.lat.toFixed(4)}, ${CURRENT_LOCATION.lon.toFixed(4)})`;
            meta.textContent = reverseError ? `${base} • Could not detect State/District (${reverseError})` : `${base} • Could not detect State/District`;
          }
          return;
        }

        const stateEl = document.getElementById('state');
        const districtEl = document.getElementById('district');
        let selectedState = '';
        if (stateEl && state) {
          selectedState = ensureOptionAndSelect(stateEl, state);
          populateDistrictsForState(selectedState || stateEl.value || '');
        }
        if (districtEl && district) {
          ensureOptionAndSelect(districtEl, district);
        }

        if (meta && (state || district)) {
          const shownState = selectedState || stateEl?.value || state;
          const shownDistrict = districtEl?.value || district;
          meta.textContent = `Using location (${CURRENT_LOCATION.lat.toFixed(4)}, ${CURRENT_LOCATION.lon.toFixed(4)}) • ${shownState}${shownDistrict ? ' / ' + shownDistrict : ''}`;
        }
      } catch (e) {
        if (meta) {
          const base = `Using location (${CURRENT_LOCATION.lat.toFixed(4)}, ${CURRENT_LOCATION.lon.toFixed(4)})`;
          const msg = String(e && e.message ? e.message : e || '').slice(0, 120);
          meta.textContent = msg ? `${base} • Auto-fill failed (${msg})` : `${base} • Auto-fill failed`;
        }
      }
    })();
  }, () => {
    if (meta) meta.textContent = 'Location access denied.';
  }, { enableHighAccuracy: false, maximumAge: 600000, timeout: 10000 });
}

function populateStates() {
  const stateEl = document.getElementById('state');
  if (!stateEl) return;
  const current = stateEl.value || '';
  stateEl.innerHTML = '<option value="">All States</option>';
  (LOCATION_DATA.states || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    stateEl.appendChild(opt);
  });
  stateEl.value = current;
}

function populateDistrictsForState(state) {
  const districtEl = document.getElementById('district');
  if (!districtEl) return;
  const districts = (LOCATION_DATA.districts_by_state || {})[state] || [];
  districtEl.innerHTML = '<option value="">All Districts</option>';
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    districtEl.appendChild(opt);
  });
  districtEl.value = '';
}

async function initMandiLocations() {
  try {
    const res = await fetch('/price/locations');
    const data = await res.json();
    if (data && data.success === true) {
      LOCATION_DATA = data;
      populateStates();
    }
  } catch (e) {
    // ignore
  }
}

document.getElementById('state').addEventListener('change', () => {
  const st = (document.getElementById('state') || {}).value || '';
  populateDistrictsForState(st);
});

initMandiLocations();
setTodayRange();

function displayResolvedCommodity(meta) {
  const box = document.getElementById('searchMeta');
  if (!box) return;
  if (!meta || !meta.requested || !meta.resolved) {
    box.innerHTML = '';
    return;
  }

  const requested = String(meta.requested).trim();
  const resolved = String(meta.resolved).trim();
  if (!requested || !resolved || requested.toLowerCase() === resolved.toLowerCase()) {
    box.innerHTML = '';
    return;
  }

  box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">Showing results for:</b> <span class="text-white font-semibold">'+resolved+'</span></p></div>';
}

function displayAiSummary(ai) {
    const box = document.getElementById('aiBox');
    if (!box) return;
    if (!ai) { box.innerHTML = ""; return; }

  const isNumericPrice = (value) => typeof value === 'number' && Number.isFinite(value);

    if (ai.enabled !== true) {
        const reason = ai.reason || 'AI summary unavailable';
    const hint = ai.hint ? '<p class="mt-2 text-sm text-slate-300">'+ai.hint+'</p>' : '';
    box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">AI Summary:</b> '+reason+'</p>'+hint+'</div>';
        return;
    }

    const parsed = ai.parsed || null;
    if (!parsed || typeof parsed !== 'object') {
    const rawText = ai.raw_text ? String(ai.raw_text) : '';
    const fallbackText = rawText || 'Could not parse model response';
    box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">AI Summary:</b> '+fallbackText+'</p></div>';
        return;
    }

    const price = parsed.recommended_modal_price;
    const currency = parsed.currency || 'INR';
    const unit = parsed.unit || '100kg';

    if (!isNumericPrice(price)) {
    box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">Price:</b> Not available</p></div>';
        return;
    }

    box.innerHTML = '<div class="ai-card"><p><b class="text-emerald-400">Price:</b> <span class="text-white font-bold">'+(currency === 'INR' ? '\u20B9' : '')+price+' / '+unit+'</span></p></div>';
}

function formatDateTime(ts) {
  const value = String(ts || '').trim();
  if (!value) return 'N/A';
  const normalized = value.endsWith('Z') ? value : (value + 'Z');
  const date = new Date(normalized);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('en-IN', {
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: true
  });
}

function displayUpdateMeta(payload) {
  const box = document.getElementById('updateMeta');
  if (!box) return;
  if (!payload || typeof payload !== 'object') {
    box.innerHTML = '';
    return;
  }

  const freshness = String(payload.price_freshness || 'Old');
  const freshnessClass = freshness === 'Fresh' ? 'fresh' : 'old';
  const freshCount = Number(payload.fresh_count || 0);
  const oldCount = Number(payload.old_count || 0);
  const fetchedAt = formatDateTime(payload.fetched_at);
  const lastScrapedAt = formatDateTime(payload.last_scraped_at);
  const refreshTriggered = payload.refresh_triggered === true;
  const refreshReason = String(payload.refresh_reason || '').trim();
  const refreshMsg = refreshTriggered
    ? '<span class="meta-chip"><i class="fa-solid fa-cloud-arrow-down"></i> Fetch Triggered'+(refreshReason ? ' ('+refreshReason+')' : '')+'</span>'
    : '';

  box.innerHTML = ''
    + '<div class="glass-panel rounded-2xl p-4 flex flex-wrap items-center gap-2">'
    + refreshMsg
    + '<span class="meta-chip"><i class="fa-regular fa-clock"></i> Last Updated: '+fetchedAt+'</span>'
    + '<span class="meta-chip"><i class="fa-solid fa-rotate"></i> Last Scraped: '+lastScrapedAt+'</span>'
    + '<span class="fresh-badge '+freshnessClass+'">'+freshness+'</span>'
    + '<span class="meta-chip"><i class="fa-solid fa-seedling"></i> Fresh: '+freshCount+'</span>'
    + '<span class="meta-chip"><i class="fa-regular fa-calendar"></i> Old: '+oldCount+'</span>'
    + '</div>';
}

function displayResults(data) {
    let html = "";
  if (data.length === 0) { html = '<div class="text-slate-500 text-sm italic">No data available for the selected filters. Try changing the district, state, or date range.</div>'; }

    data.forEach(m => {
      const itemFreshness = String(m.price_freshness || 'Old');
      const itemFreshnessClass = itemFreshness === 'Fresh' ? 'fresh' : 'old';
        html += '<div class="market-card">'
            +'<p data-label="market"><b class="label">'+(window.__t&&window.__t('label.market')||'Market:')+'</b> <span class="value">'+m.market+'</span></p>'
            +'<p data-label="district"><b class="label">'+(window.__t&&window.__t('label.district')||'District:')+'</b> <span class="value">'+m.district+'</span></p>'
            +'<p data-label="state"><b class="label">'+(window.__t&&window.__t('label.state')||'State:')+'</b> <span class="value">'+m.state+'</span></p>'
            +'<p data-label="variety"><b class="label">'+(window.__t&&window.__t('label.variety')||'Variety:')+'</b> <span class="value">'+(m.variety||"N/A")+'</span></p>'
            +'<p data-label="grade"><b class="label">'+(window.__t&&window.__t('label.grade')||'Grade:')+'</b> <span class="value">'+(m.grade||"N/A")+'</span></p>'
            +'<p data-label="min_price"><b class="label">'+(window.__t&&window.__t('label.min_price')||'Min Price:')+'</b> <span class="value text-emerald-400">\u20B9'+m.min_price+' / 100kg</span></p>'
            +'<p data-label="max_price"><b class="label">'+(window.__t&&window.__t('label.max_price')||'Max Price:')+'</b> <span class="value text-emerald-400">\u20B9'+m.max_price+' / 100kg</span></p>'
            +'<p data-label="modal_price"><b class="label">'+(window.__t&&window.__t('label.modal_price')||'Modal Price:')+'</b> <span class="value text-white font-bold">\u20B9'+m.modal_price+' / 100kg</span></p>'
        +'<p data-label="date"><b class="label">'+(window.__t&&window.__t('label.date')||'Date:')+'</b> <span class="value">'+(m.arrival_date||'N/A')+'</span></p>'
        +'<p data-label="freshness"><b class="label">Price Status:</b> <span class="fresh-badge '+itemFreshnessClass+'">'+itemFreshness+'</span></p>'
            +'</div>';
    });

    document.getElementById("resultBox").innerHTML = html;
    try{ if(typeof ensureI18nLoaded === 'function') ensureI18nLoaded(function(){ try{ if(typeof applyTranslations === 'function') applyTranslations(); }catch(e){} }); }catch(e){}
}

function sortData(type) {
    if (type === "high") MARKET_DATA.sort((a, b) => b.modal_price - a.modal_price);
    else MARKET_DATA.sort((a, b) => a.modal_price - b.modal_price);
    displayResults(MARKET_DATA);
}

function sortNearest() {
    if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        MARKET_DATA.sort((a, b) => {
            const dA = (a.lat && a.lon) ? haversine(lat, lon, a.lat, a.lon) : 99999;
            const dB = (b.lat && b.lon) ? haversine(lat, lon, b.lat, b.lon) : 99999;
            return dA - dB;
        });
        displayResults(MARKET_DATA);
    }, () => { alert('Location access denied'); });
}

// Enter key support
document.getElementById('commodityInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();getPrice();}});
