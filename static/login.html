<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Login</title>
  <meta name="google-site-verification" content="xmyUSkVyJ0G2CkvmFuRuNhdMVtLFpUnlI8Q3YOIif9s" />
  <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important;margin:0;padding:0}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{width:100%;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9 !important;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .btn-primary{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#10b981,#0ea5e9);color:#fff;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif;transition:box-shadow .2s,transform .15s;box-shadow:0 4px 20px rgba(16,185,129,.35);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary:hover{box-shadow:0 6px 28px rgba(16,185,129,.5);transform:translateY(-1px)}
    .btn-ghost{padding:10px 14px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,.12);color:#94a3b8;font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-ghost:hover{border-color:#34d399;color:#fff}
    .tab-btn{flex:1;padding:10px;border-radius:10px;text-align:center;cursor:pointer;color:#64748b;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent}
    .tab-btn.active{background:rgba(16,185,129,.12);color:#34d399;font-weight:600;border-color:rgba(16,185,129,.3)}
    .otp-box{display:none;margin-top:12px}
    .otp-box.show{display:block}
    .msg{font-size:13px;margin-top:8px;padding:10px 14px;border-radius:10px;display:none}
    .msg.err{display:block;background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
    .msg.ok{display:block;background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
    label{font-size:12px;color:#64748b;display:block;margin-top:14px;margin-bottom:4px;font-weight:500}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:.15;pointer-events:none;z-index:0}
    .divider{display:flex;align-items:center;gap:12px;color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-top:18px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
    .google-slot{margin-top:14px}
    .google-note{font-size:12px;color:#94a3b8;text-align:center;margin-top:10px}
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <div class="blob" style="width:500px;height:500px;background:#10b981;top:-120px;left:-80px"></div>
  <div class="blob" style="width:400px;height:400px;background:#3b82f6;bottom:-60px;right:-100px"></div>

  <div class="glass-panel rounded-3xl w-full max-w-md mx-4 p-8 relative z-10">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-blue-500 shadow-lg shadow-emerald-500/30 mb-3">
        <i class="fa-solid fa-leaf text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">Agri<span class="gradient-text">AI-360</span></h1>
    </div>

    <div class="flex gap-2 mb-5">
      <div id="tab-login" class="tab-btn active" onclick="showLogin()">Login</div>
      <div id="tab-signup" class="tab-btn" onclick="showSignup()">Sign Up</div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login View -->
    <div id="login-view">
      <label>Email</label>
      <input id="login-email" class="agri-input" type="email" autocomplete="email" placeholder="you@domain.com">
      <label>Password</label>
      <input id="login-password" class="agri-input" type="password" autocomplete="current-password" placeholder="Your password">

      <button id="btn-login" class="btn-primary mt-5">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
      </button>

      <div class="divider">or</div>
      <div class="google-slot">
        <button id="btn-google-login" class="btn-ghost" type="button">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>
      </div>
      <div id="google-login-note" class="google-note" style="display:none"></div>

      <div class="flex justify-between items-center mt-3">
        <span class="text-emerald-400 cursor-pointer text-sm font-medium hover:text-emerald-300 transition-colors" id="to-forgot"><i class="fa-solid fa-key fa-xs mr-1"></i>Forgot password?</span>
        <span class="text-emerald-400 cursor-pointer text-sm font-medium hover:text-emerald-300 transition-colors" id="to-signup-link">Create account <i class="fa-solid fa-arrow-right fa-xs"></i></span>
      </div>

      <!-- Forgot Password Flow -->
      <div id="forgot-box" class="otp-box">
        <div class="mt-2 p-4 rounded-xl" style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15)">
          <p class="text-blue-300 text-xs mb-3"><i class="fa-solid fa-circle-info fa-xs mr-1"></i>We'll send a one-time code to verify your identity.</p>
          <button id="btn-forgot-send" class="btn-ghost"><i class="fa-solid fa-paper-plane fa-xs"></i> Send OTP</button>
          <div id="forgot-otp-input" style="display:none" class="mt-3">
            <div class="mb-3">
              <label style="margin-top:0">Enter OTP</label>
              <input id="forgot-otp" class="agri-input" type="text" placeholder="6-digit OTP" maxlength="6">
            </div>
            <div class="mb-3">
              <label style="margin-top:0">New Password</label>
              <input id="forgot-new-pw" class="agri-input" type="password" placeholder="Choose new password">
            </div>
            <div class="mb-3">
              <label style="margin-top:0">Confirm New Password</label>
              <input id="forgot-new-pw-confirm" class="agri-input" type="password" placeholder="Re-enter new password">
            </div>
            <button id="btn-forgot-verify" class="btn-primary"><i class="fa-solid fa-check-double"></i> Verify & Reset Password</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Signup View -->
    <div id="signup-view" style="display:none">
      <label>Email</label>
      <input id="signup-email" class="agri-input" type="email" autocomplete="email" placeholder="you@domain.com">
      <label>Full Name</label>
      <input id="signup-name" class="agri-input" type="text" placeholder="Your full name">
      <label>Phone</label>
      <input id="signup-phone" class="agri-input" type="text" placeholder="Mobile number">
      <label>Address</label>
      <input id="signup-address" class="agri-input" type="text" placeholder="Village / Street">
      <div class="flex gap-2 mt-1">
        <input id="signup-city" class="agri-input" type="text" placeholder="City">
        <input id="signup-pincode" class="agri-input" type="text" placeholder="Pincode">
      </div>
      <label>Password</label>
      <input id="signup-password" class="agri-input" type="password" autocomplete="new-password" placeholder="Choose a password">
      <label>Confirm Password</label>
      <input id="signup-password-confirm" class="agri-input" type="password" autocomplete="new-password" placeholder="Re-enter password">

      <button id="btn-signup" class="btn-primary mt-5">
        <i class="fa-solid fa-user-plus"></i> Sign Up
      </button>

      <div class="divider">or</div>
      <div class="google-slot">
        <button id="btn-google-signup" class="btn-ghost" type="button">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>
      </div>
      <div id="google-signup-note" class="google-note" style="display:none"></div>

      <div id="signup-otp-box" class="otp-box">
        <label>Enter OTP sent to your email</label>
        <input id="signup-otp" class="agri-input" type="text" placeholder="6-digit code" maxlength="6">
        <button id="btn-verify-signup-otp" class="btn-primary mt-3">
          <i class="fa-solid fa-check-double"></i> Verify & Create
        </button>
      </div>

      <div class="mt-3 text-center">
        <span class="text-slate-500 text-sm">Already have an account?</span>
        <span class="text-emerald-400 cursor-pointer text-sm font-medium ml-1 hover:text-emerald-300 transition-colors" id="to-login">Log in</span>
      </div>
    </div>
  </div>

<script>
const tabLogin=document.getElementById('tab-login'), tabSignup=document.getElementById('tab-signup');
const loginView=document.getElementById('login-view'), signupView=document.getElementById('signup-view');
const msgEl=document.getElementById('msg');
const googleLoginBtn=document.getElementById('btn-google-login');
const googleSignupBtn=document.getElementById('btn-google-signup');
const googleLoginNote=document.getElementById('google-login-note');
const googleSignupNote=document.getElementById('google-signup-note');
let firebaseAuth=null;
let googleSignupReady=false;

function showMsg(text,type){msgEl.className='msg '+(type||'err');msgEl.textContent=text;msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}

function showLogin(){tabLogin.classList.add('active');tabSignup.classList.remove('active');loginView.style.display='block';signupView.style.display='none';hideMsg();}
function showSignup(){tabSignup.classList.add('active');tabLogin.classList.remove('active');loginView.style.display='none';signupView.style.display='block';hideMsg();}
document.getElementById('to-signup-link').onclick=showSignup;
document.getElementById('to-login').onclick=showLogin;

async function postJson(url,body){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)});
  try{return await res.json();}catch(e){return{success:false,message:'Invalid server response'}}
}

function setButtonBusy(button, busy, busyHtml, idleHtml){
  if(!button) return;
  button.disabled = !!busy;
  button.style.opacity = busy ? '.7' : '';
  button.style.pointerEvents = busy ? 'none' : '';
  button.innerHTML = busy ? busyHtml : idleHtml;
}

function setGoogleSignupNote(text){
  [googleLoginNote, googleSignupNote].forEach(note=>{
    if(!note) return;
    note.textContent=text;
    note.style.display=text?'block':'none';
  });
}

function firebaseAuthErrorMessage(error){
  const code=(error&&error.code)||'';
  if(code==='auth/popup-closed-by-user') return 'Google popup was closed before sign in completed';
  if(code==='auth/cancelled-popup-request') return 'Google sign in is already in progress';
  if(code==='auth/popup-blocked') return 'Google popup was blocked by the browser. Allow popups and try again.';
  if(code==='auth/unauthorized-domain') return 'This domain is not authorized in Firebase Authentication. Add localhost or your site domain in Firebase console.';
  if(code==='auth/operation-not-allowed') return 'Google sign-in is not enabled in Firebase Authentication. Enable the Google provider in Firebase console.';
  if(code==='auth/network-request-failed') return 'Network error while contacting Firebase. Check your connection and try again.';
  if(code==='auth/account-exists-with-different-credential') return 'An account already exists with this email using a different sign-in method.';
  if(code){
    return 'Google sign up failed: '+code;
  }
  return 'Google sign up failed. Please try again.';
}

async function completeGoogleServerLogin(firebaseToken, mode){
  hideMsg();
  if(!firebaseToken){showMsg('Google sign up failed. Please try again.');return;}
  setGoogleSignupNote('Signing you in with Google...');
  try{
    const r=await postJson('/auth/google',{firebase_token:firebaseToken,mode:mode||'login'});
    if(!r.success){
      setGoogleSignupNote('');
      showMsg(r.message||'Google sign up failed');
      return;
    }
    setGoogleSignupNote('Google account verified. Redirecting...');
    setTimeout(()=>{window.location.href=r.redirect||(r.role==='admin'?'/admin/dashboard':'/home');},300);
  }catch(e){
    setGoogleSignupNote('');
    showMsg('Network error - please try again');
  }
}

async function initGoogleSignup(){
  if(googleSignupReady||!googleSignupBtn) return;
  try{
    const cfg=await fetch('/auth/google/config',{credentials:'include'}).then(r=>r.json());
    if(!cfg||!cfg.enabled||!cfg.firebase){
      setGoogleSignupNote('Google sign up is not configured on the server.');
      return;
    }
    if(!window.firebase||!window.firebase.initializeApp||!window.firebase.auth){
      setGoogleSignupNote('Firebase authentication could not be loaded right now.');
      return;
    }
    if(!window.firebase.apps.length){
      window.firebase.initializeApp(cfg.firebase);
    }
    firebaseAuth=window.firebase.auth();
    googleSignupReady=true;
    setGoogleSignupNote('Use your Google account to create or continue with the same email.');
  }catch(e){
    setGoogleSignupNote('Google sign up is unavailable right now.');
  }
}

googleSignupBtn&&googleSignupBtn.addEventListener('click',async()=>{
  await handleGoogleAuthClick(googleSignupBtn,'signup');
});

googleLoginBtn&&googleLoginBtn.addEventListener('click',async()=>{
  await handleGoogleAuthClick(googleLoginBtn,'login');
});

async function handleGoogleAuthClick(button, mode){
  hideMsg();
  if(!googleSignupReady){
    await initGoogleSignup();
  }
  if(!googleSignupReady||!firebaseAuth){
    showMsg('Google sign up is unavailable right now');
    return;
  }

  const idleHtml='<i class="fa-brands fa-google"></i> Continue with Google';
  setButtonBusy(button,true,'<i class="fa-solid fa-spinner fa-spin"></i> Connecting...',idleHtml);
  setGoogleSignupNote('Opening Google sign in...');
  try{
    const provider=new window.firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    const result=await firebaseAuth.signInWithPopup(provider);
    const firebaseToken=await result.user.getIdToken();
    await completeGoogleServerLogin(firebaseToken,mode);
    await firebaseAuth.signOut().catch(()=>{});
  }catch(e){
    await firebaseAuth.signOut().catch(()=>{});
    setGoogleSignupNote('');
    showMsg(firebaseAuthErrorMessage(e));
  }finally{
    setButtonBusy(button,false,'<i class="fa-solid fa-spinner fa-spin"></i> Connecting...',idleHtml);
  }
}

// Direct password login
document.getElementById('btn-login').addEventListener('click',async()=>{
  hideMsg();
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if(!email||!password){showMsg('Enter email and password');return;}
  const r=await postJson('/auth/login_password',{email,password});
  if(r.success){
    showMsg('Login successful!','ok');
    setTimeout(()=>{window.location.href=r.redirect||(r.role==='admin'?'/admin/dashboard':'/home');},500);
  } else {
    showMsg(r.message||'Login failed');
  }
});

document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('btn-login').click();}});

// Forgot password flow
document.getElementById('to-forgot').addEventListener('click',()=>{
  document.getElementById('forgot-box').classList.toggle('show');
});

document.getElementById('btn-forgot-send').addEventListener('click',async()=>{
  hideMsg();
  const email=document.getElementById('login-email').value.trim();
  if(!email){showMsg('Enter your email first');return;}
  const btn=document.getElementById('btn-forgot-send');
  btn.disabled=true;
  btn.innerHTML='<i class="fa-solid fa-spinner fa-spin fa-xs"></i> Sending...';
  try{
    const r=await postJson('/auth/forgot_password',{email});
    if(r.success){
      showMsg(r.message||'OTP sent to your email','ok');
      document.getElementById('forgot-otp-input').style.display='block';
    } else {
      showMsg(r.message||'Failed to send OTP');
    }
  }catch(e){
    showMsg('Network error - please try again');
  }finally{
    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-paper-plane fa-xs"></i> Send OTP';
  }
});

document.getElementById('btn-forgot-verify').addEventListener('click',async()=>{
  hideMsg();
  const otp=document.getElementById('forgot-otp').value.trim();
  const newPw=document.getElementById('forgot-new-pw').value;
  const newPwConfirm=document.getElementById('forgot-new-pw-confirm').value;
  if(!otp||!newPw){showMsg('Enter OTP and new password');return;}
  if(newPw!==newPwConfirm){showMsg('Passwords do not match');return;}
  const email=document.getElementById('login-email').value.trim();
  const r=await postJson('/auth/reset_password',{otp,new_password:newPw});
  if(r.success){
    showMsg('Password reset! Logging you in...','ok');
    document.getElementById('forgot-box').classList.remove('show');
    // Auto-login with the new password
    const lr=await postJson('/auth/login_password',{email,password:newPw});
    if(lr.success){
      setTimeout(()=>{window.location.href=lr.redirect||(lr.role==='admin'?'/admin/dashboard':'/home');},500);
    } else {
      showMsg('Password reset! Please log in with your new password.','ok');
    }
  }
  else{showMsg(r.message||'Reset failed');}
});

// Signup flow
document.getElementById('btn-signup').addEventListener('click',async()=>{
  hideMsg();
  const btn=document.getElementById('btn-signup');
  if(btn.disabled) return;
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  const passwordConfirm=document.getElementById('signup-password-confirm').value;
  const name=document.getElementById('signup-name').value.trim();
  const phone=document.getElementById('signup-phone').value.trim();
  const address=document.getElementById('signup-address').value.trim();
  const city=document.getElementById('signup-city').value.trim();
  const pincode=document.getElementById('signup-pincode').value.trim();
  if(!email||!password){showMsg('Enter email and choose a password');return;}
  if(password!==passwordConfirm){showMsg('Passwords do not match');return;}
  setButtonBusy(btn,true,'<i class="fa-solid fa-spinner fa-spin"></i> Sending OTP...','<i class="fa-solid fa-user-plus"></i> Sign Up');
  try{
    const r=await postJson('/auth/register',{email,password,profile:{name,phone,address,city,pincode}});
    if(r.success){showMsg(r.message||'OTP sent','ok');document.getElementById('signup-otp-box').classList.add('show');}
    else{showMsg(r.message||'Registration failed');}
  }catch(e){
    showMsg('Network error - please try again');
  }finally{
    setButtonBusy(btn,false,'<i class="fa-solid fa-spinner fa-spin"></i> Sending OTP...','<i class="fa-solid fa-user-plus"></i> Sign Up');
  }
});

document.getElementById('btn-verify-signup-otp').addEventListener('click',async()=>{
  hideMsg();
  const btn=document.getElementById('btn-verify-signup-otp');
  if(btn.disabled) return;
  const otp=document.getElementById('signup-otp').value.trim();
  if(!otp){showMsg('Enter OTP');return;}
  setButtonBusy(btn,true,'<i class="fa-solid fa-spinner fa-spin"></i> Verifying...','<i class="fa-solid fa-check-double"></i> Verify & Create');
  try{
    const r=await postJson('/auth/verify_otp',{otp});
    if(!r.success){showMsg(r.message||'OTP verify failed');return;}
    try{
      const profile={email:document.getElementById('signup-email').value.trim(),name:document.getElementById('signup-name').value.trim(),phone:document.getElementById('signup-phone').value.trim(),address:document.getElementById('signup-address').value.trim(),city:document.getElementById('signup-city').value.trim(),pincode:document.getElementById('signup-pincode').value.trim()};
      localStorage.setItem('agri_profile',JSON.stringify(profile));
    }catch(e){}
    window.location.href=r.redirect||(r.role==='admin'?'/admin/dashboard':'/home');
  }catch(e){
    showMsg('Network error - please try again');
  }finally{
    setButtonBusy(btn,false,'<i class="fa-solid fa-spinner fa-spin"></i> Verifying...','<i class="fa-solid fa-check-double"></i> Verify & Create');
  }
});

['signup-otp','forgot-otp'].forEach(id=>{
  const el=document.getElementById(id);
  el&&el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById(id==='signup-otp'?'btn-verify-signup-otp':'btn-forgot-verify').click();}});
});

window.addEventListener('load',()=>{initGoogleSignup();});

// Banner if already logged in
(async function(){
  try{
    const r=await fetch('/api/user',{credentials:'include'}).then(x=>x.json());
    if(r&&r.logged){
      const banner=document.createElement('div');
      banner.className='fixed left-4 top-4 right-4 z-50 flex justify-between items-center gap-3 p-4 rounded-2xl';
      banner.style.cssText='background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);backdrop-filter:blur(12px)';
      banner.innerHTML='<div class="text-emerald-400 font-semibold text-sm"><i class="fa-solid fa-circle-check mr-1.5"></i>Signed in as '+(r.user&&r.user.email?r.user.email:'user')+'</div>';
      const btn=document.createElement('button');
      btn.textContent='Continue to Home';
      btn.className='px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-blue-500 text-white text-sm font-semibold border-0 cursor-pointer';
      btn.addEventListener('click',()=>{window.location.href='/home';});
      banner.appendChild(btn);
      document.body.appendChild(banner);
    }
  }catch(e){}
})();
</script>
</body>
</html>
