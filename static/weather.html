<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgriAI-360 | Weather</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;font-family:'Poppins',sans-serif;transition:border-color .2s,box-shadow .2s}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
    .agri-table{width:100%;border-collapse:collapse}
    .agri-table th{background:rgba(255,255,255,.04);color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);font-weight:600}
    .agri-table td{padding:10px 14px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;vertical-align:middle}
    .agri-table tr:hover td{background:rgba(255,255,255,.025)}
    .range-btn{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#64748b;font-size:12px;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
    .range-btn:hover,.range-btn.active{border-color:rgba(16,185,129,.4);color:#34d399;background:rgba(16,185,129,.08)}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<script src="/theme.js"></script>
<div id="site-header"></div>
<script src="/header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight"><i class="fa-solid fa-cloud-sun-rain mr-2 text-blue-400"></i>Weather <span class="gradient-text">Advice</span></h1>
    <p class="mt-1 text-slate-400 text-sm" data-i18n="weather.desc">Get localized weather forecast and farming advice.</p>
  </div>

  <!-- Location Input -->
  <div class="glass-panel rounded-2xl p-5 mb-5">
    <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
      <button id="use-loc" class="px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-location-crosshairs"></i><span data-i18n="weather.use_auto">Use my location</span>
      </button>
      <span class="text-slate-500 text-sm text-center">or</span>
      <div class="relative flex-1">
        <i class="fa-solid fa-city absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
        <input id="city-input" class="agri-input w-full pl-9 pr-4 py-3 rounded-xl text-sm" placeholder="e.g. Thekkalur">
      </div>
      <button id="city-get" class="px-4 py-3 rounded-xl text-sm font-medium text-slate-400 flex items-center gap-2 transition-colors hover:text-white whitespace-nowrap" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)" data-i18n="weather.get">
        <i class="fa-solid fa-cloud-arrow-down"></i> Get Forecast
      </button>
    </div>
  </div>

  <div id="status" class="text-slate-500 text-sm mb-3"></div>

  <!-- Results -->
  <div id="weather-result" style="display:none" class="space-y-4">
    <!-- Forecast Summary -->
    <div class="glass-panel rounded-2xl p-6">
      <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-3" data-i18n="weather.forecast"><i class="fa-solid fa-chart-line text-emerald-400 fa-sm"></i>Forecast</h2>
      <div id="forecast-summary" class="text-slate-300 text-sm font-medium"></div>
    </div>

    <!-- Range Buttons -->
    <div class="flex gap-2">
      <button class="range-btn active" id="range-24h" type="button"><i class="fa-solid fa-clock fa-xs"></i> 24h</button>
      <button class="range-btn" id="range-2d" type="button"><i class="fa-solid fa-calendar-day fa-xs"></i> 2 days</button>
      <button class="range-btn" id="range-1w" type="button"><i class="fa-solid fa-calendar-week fa-xs"></i> 1 week</button>
    </div>

    <!-- Raw JSON -->
    <details id="forecast-raw">
      <summary class="text-slate-600 text-xs cursor-pointer py-1">Show raw forecast JSON</summary>
      <div id="forecast-json" class="glass-panel rounded-xl p-4 mt-2 font-mono text-xs text-slate-500 max-h-60 overflow-auto whitespace-pre-wrap"></div>
    </details>

    <!-- Advice -->
    <div class="glass-panel rounded-2xl p-6">
      <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-3" data-i18n="weather.advice"><i class="fa-solid fa-lightbulb text-amber-400 fa-sm"></i>Advice</h2>
      <ul id="advice-list" class="pl-5 text-slate-300 text-sm leading-relaxed list-disc"></ul>
    </div>

    <!-- Auto Actions -->
    <div class="glass-panel rounded-2xl p-6">
      <h2 class="text-base font-semibold text-white flex items-center gap-2 mb-3"><i class="fa-solid fa-gears text-blue-400 fa-sm"></i>Automated Actions</h2>
      <div id="auto-advice" class="text-slate-400 text-sm"></div>
    </div>

    <!-- Forecast Table -->
    <div class="glass-panel rounded-2xl p-6 overflow-x-auto">
      <table class="agri-table" style="min-width:600px">
        <thead>
          <tr><th>When</th><th>Temp</th><th>Precip %</th><th>Weather</th><th>Wind (m/s)</th><th>Action</th></tr>
        </thead>
        <tbody id="forecast-rows"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  async function showStatus(t){try{document.getElementById('status').innerText=t;}catch(e){}}

  let __lastWeatherData=null;
  let __range='1w';
  const __weatherClientCache = new Map();

  function _openMeteoWeatherDesc(code){
    const c = parseInt(code, 10);
    const mapping = {
      0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
      45:'Fog',48:'Depositing rime fog',51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',
      61:'Slight rain',63:'Moderate rain',65:'Heavy rain',71:'Slight snow fall',73:'Moderate snow fall',75:'Heavy snow fall',
      80:'Rain showers',81:'Heavy rain showers',82:'Violent rain showers',
      95:'Thunderstorm',96:'Thunderstorm with hail',99:'Thunderstorm with heavy hail'
    };
    return mapping.hasOwnProperty(c) ? mapping[c] : ('Weather code '+c);
  }

  function _openMeteoToOneCallLike(om){
    const daily=(om && om.daily) || {};
    const hourly=(om && om.hourly) || {};

    const times=(daily.time)||[];
    const tmax=(daily.temperature_2m_max)||[];
    const tmin=(daily.temperature_2m_min)||[];
    const pop=(daily.precipitation_probability_max)||[];
    const wind=(daily.windspeed_10m_max)||[];
    const wcode=(daily.weathercode)||[];

    const h_times=(hourly.time)||[];
    const h_temp=(hourly.temperature_2m)||[];
    const h_pop=(hourly.precipitation_probability)||[];
    const h_wind=(hourly.windspeed_10m)||[];
    const h_wcode=(hourly.weathercode)||[];

    function toEpochSeconds(t){
      try{
        const ms=Date.parse(t);
        if(isFinite(ms)) return Math.floor(ms/1000);
      }catch(e){}
      return null;
    }

    const out_hourly=[];
    for(let i=0;i<Math.min(48,h_times.length);i++){
      const dt=toEpochSeconds(h_times[i]);
      const popPct=(i<h_pop.length)?h_pop[i]:null;
      const popFrac=(popPct!=null && isFinite(popPct))? (Number(popPct)/100.0) : 0;
      const code=(i<h_wcode.length)?h_wcode[i]:null;
      out_hourly.push({
        dt: dt,
        temp: (i<h_temp.length)?h_temp[i]:null,
        pop: popFrac,
        wind_speed: (i<h_wind.length)?h_wind[i]:null,
        weather: [{id:0, description:_openMeteoWeatherDesc(code)}],
        weathercode: code,
      });
    }

    const out_daily=[];
    for(let i=0;i<Math.min(7,times.length);i++){
      const dt=toEpochSeconds(times[i]);
      const popPct=(i<pop.length)?pop[i]:null;
      const popFrac=(popPct!=null && isFinite(popPct))? (Number(popPct)/100.0) : 0;
      const code=(i<wcode.length)?wcode[i]:null;
      out_daily.push({
        dt: dt,
        temp: {max:(i<tmax.length)?tmax[i]:null, min:(i<tmin.length)?tmin[i]:null},
        pop: popFrac,
        wind_speed: (i<wind.length)?wind[i]:null,
        weather: [{id:0, description:_openMeteoWeatherDesc(code)}],
        weathercode: code,
      });
    }

    // Summary like backend
    let summary='';
    try{
      const ds=out_daily.slice(0,3);
      const highs=ds.map(d=>d && d.temp ? d.temp.max : null).filter(v=>v!=null);
      const lows=ds.map(d=>d && d.temp ? d.temp.min : null).filter(v=>v!=null);
      const pops=ds.map(d=>d && d.pop ? d.pop : 0);
      const maxHigh=(highs.length?Math.max(...highs):null);
      const minLow=(lows.length?Math.min(...lows):null);
      const avgPop=pops.length?Math.round((pops.reduce((a,b)=>a+b,0)/pops.length)*100):0;
      const parts=[];
      if(maxHigh!=null && minLow!=null) parts.push(`Next 3 days temps ${minLow.toFixed(0)}°C–${maxHigh.toFixed(0)}°C`);
      if(avgPop) parts.push(`Chance of precipitation ~${avgPop}%`);
      summary=parts.join(' — ');
    }catch(e){summary='';}

    const payload={
      provider:'open-meteo',
      latitude: om && om.latitude,
      longitude: om && om.longitude,
      timezone: om && om.timezone,
      current_weather: om && om.current_weather,
      hourly: out_hourly,
      daily: out_daily,
    };
    return {forecast: payload, summary: summary};
  }

  function _buildAdviceFromForecast(forecast){
    const advice=[];
    const daily=(forecast && forecast.daily) ? forecast.daily.slice(0,3) : [];
    for(const day of daily){
      const pop=day && day.pop ? day.pop : 0;
      const temps=(day && day.temp) || {};
      const tmax=temps.max;
      const tmin=temps.min;
      if(pop && pop>=0.5) advice.push('Rain likely — consider covering susceptible crops and postponing sprays.');
      if(tmax!=null && tmax>=35) advice.push('High temperatures expected — increase irrigation and monitor for heat stress.');
      if(tmin!=null && tmin<=3) advice.push('Low temperatures expected — protect young seedlings from frost.');
      const wind=day && day.wind_speed ? day.wind_speed : 0;
      if(wind && wind>=10) advice.push('Strong winds expected — secure structures and avoid spraying on high-wind days.');
    }
    // dedupe
    const seen=new Set();
    const out=[];
    for(const a of advice){ if(!seen.has(a)){ seen.add(a); out.push(a);} }
    return out.length?out:['No specific advice for the next days.'];
  }

  async function callWeatherDirectOpenMeteo(params){
    const lat=Number(params && params.lat);
    const lon=Number(params && params.lon);
    if(!isFinite(lat) || !isFinite(lon)) return null;

    // Cache per rounded location (2 decimals ~1km)
    const key=(Math.round(lat*100)/100)+','+(Math.round(lon*100)/100);
    const now=Date.now();
    const cached=__weatherClientCache.get(key);
    if(cached && (now-cached.ts) < 120000){
      return cached.data;
    }

    const url='https://api.open-meteo.com/v1/forecast?'+new URLSearchParams({
      latitude:String(lat),
      longitude:String(lon),
      current_weather:'true',
      hourly:'temperature_2m,precipitation_probability,windspeed_10m,weathercode',
      daily:'temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,weathercode',
      timezone:'auto',
      forecast_days:'7',
    }).toString();

    const r=await fetch(url);
    if(!r.ok){
      const txt=await r.text().catch(()=> '');
      throw new Error('Open-Meteo error (HTTP '+r.status+'): '+String(txt).slice(0,160));
    }
    const om=await r.json();
    const transformed=_openMeteoToOneCallLike(om);
    const out={
      forecast: transformed.forecast,
      advice: _buildAdviceFromForecast(transformed.forecast),
    };
    if(transformed.summary) out.summary=transformed.summary;
    __weatherClientCache.set(key,{ts: now, data: out});
    return out;
  }

  function setRange(r){
    __range=r||'1w';
    document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
    const activeId=(__range==='24h')?'range-24h':(__range==='2d'?'range-2d':'range-1w');
    const activeEl=document.getElementById(activeId);
    if(activeEl) activeEl.classList.add('active');
    if(__lastWeatherData){renderWeather(__lastWeatherData);}
  }

  try{
    document.getElementById('range-24h').addEventListener('click',()=>setRange('24h'));
    document.getElementById('range-2d').addEventListener('click',()=>setRange('2d'));
    document.getElementById('range-1w').addEventListener('click',()=>setRange('1w'));
  }catch(e){}

  async function callWeather(params){
    try{
      showStatus('Loading...');
      // Prefer direct Open-Meteo from the browser to avoid Render datacenter IP rate limits.
      try{
        const direct=await callWeatherDirectOpenMeteo(params);
        showStatus('');
        return direct;
      }catch(e){
        // Fallback to backend proxy if direct call fails (network/CORS/etc).
        const url='/api/weather?'+new URLSearchParams(params).toString();
        const r=await fetch(url);
        if(!r.ok){
          const err=await r.json().catch(()=>({error:'unknown'}));
          const extra=(err && (err.details||err.status_code||err.provider)) ? (' — '+(
            (err.details ? String(err.details).slice(0,180) : '') ||
            (err.status_code ? ('HTTP '+err.status_code) : '') ||
            (err.provider ? String(err.provider) : '')
          )) : '';
          showStatus('Error: '+(err.error||r.statusText)+extra);
          return null;
        }
        const jd=await r.json();
        showStatus('');
        return jd;
      }
    }catch(e){showStatus('Could not fetch weather: '+e);return null}
  }

  async function geocodePlaceNameToLatLon(name){
    const q=(name||'').trim();
    if(!q) return null;
    // 1) Try Open-Meteo geocoding (free, no key)
    try{
      const url='https://geocoding-api.open-meteo.com/v1/search?'+new URLSearchParams({name:q,count:'1',language:'en',format:'json'}).toString();
      const r=await fetch(url);
      if(r.ok){
        const jd=await r.json().catch(()=>null);
        const top=jd && jd.results && jd.results[0];
        if(top && typeof top.latitude==='number' && typeof top.longitude==='number'){
          return {lat:top.latitude, lon:top.longitude};
        }
      }
    }catch(e){}

    // 2) Fallback to Nominatim (best-effort, may be rate-limited)
    try{
      const url='https://nominatim.openstreetmap.org/search?'+new URLSearchParams({q:q,format:'json',limit:'1'}).toString();
      const r=await fetch(url);
      if(r.ok){
        const arr=await r.json().catch(()=>null);
        const top=arr && arr[0];
        const lat=top && parseFloat(top.lat);
        const lon=top && parseFloat(top.lon);
        if(isFinite(lat) && isFinite(lon)) return {lat:lat, lon:lon};
      }
    }catch(e){}

    return null;
  }

  document.getElementById('use-loc').addEventListener('click',()=>{
    if(!navigator.geolocation){showStatus('Geolocation not supported');return}
    showStatus('Requesting device location...');
    navigator.geolocation.getCurrentPosition(async pos=>{
      const lat=pos.coords.latitude;const lon=pos.coords.longitude;
      try{
        const rg=await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&zoom=16&accept-language=en');
        if(rg.ok){const rd=await rg.json();const a=rd.address||{};const city=a.village||a.town||a.city||a.state_district||a.county||'';if(city) document.getElementById('city-input').value=city;}
      }catch(e){}
      const data=await callWeather({lat:lat,lon:lon});
      renderWeather(data);
    },err=>{showStatus('Location denied or unavailable: '+(err.message||err.code));});
  });

  document.getElementById('city-get').addEventListener('click',async()=>{
    const q=document.getElementById('city-input').value.trim();
    if(!q){showStatus('Enter a location name or use my location');return}
    showStatus('Finding location...');
    const loc=await geocodePlaceNameToLatLon(q);
    if(!loc){
      showStatus('Could not resolve that location. Try a nearby town name or tap "Use my location".');
      return;
    }
    const data=await callWeather({lat:loc.lat,lon:loc.lon});
    renderWeather(data);
  });
  document.getElementById('city-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('city-get').click();}});

  function renderWeather(data){
    if(!data){return}
    __lastWeatherData=data;
    document.getElementById('weather-result').style.display='block';
    document.getElementById('forecast-json').textContent=JSON.stringify(data.forecast||data,null,2);
    document.getElementById('forecast-summary').textContent=data.summary||'';
    const adv=document.getElementById('advice-list');adv.innerHTML='';
    const arr=data.advice||[];
    if(arr.length===0){const li=document.createElement('li');li.textContent=(window.__t&&window.__t('weather.no_advice'))||'No specific advice for the next days.';adv.appendChild(li);}
    arr.forEach(a=>{const li=document.createElement('li');li.textContent=a;adv.appendChild(li);});
    try{document.getElementById('forecast-raw').open=false}catch(e){}

    const rowsEl=document.getElementById('forecast-rows');rowsEl.innerHTML='';
    const autoAdvice=[];
    function pushAdvice(a){if(!a)return;if(autoAdvice.indexOf(a)===-1)autoAdvice.push(a);}
    function fmt(dt){try{const d=new Date(dt*1000);return d.toLocaleString();}catch(e){return dt}}

    const forecast=data.forecast||data;
    if(forecast&&__range==='24h'&&forecast.hourly&&Array.isArray(forecast.hourly)&&forecast.hourly.length){
      forecast.hourly.slice(0,24).forEach(h=>{
        const when=fmt(h.dt);const temp=(h.temp!=null)?Math.round(h.temp):'';const pop=(h.pop!=null)?Math.round(h.pop*100):'';
        const weather=(h.weather&&h.weather[0]&&h.weather[0].description)||'';const wind=h.wind_speed!=null?(Math.round(h.wind_speed*10)/10):'';
        const tr=document.createElement('tr');
        tr.innerHTML='<td>'+when+'</td><td>'+temp+'</td><td>'+pop+'</td><td>'+weather+'</td><td>'+wind+'</td><td class="action-cell" style="color:#fbbf24;font-size:12px"></td>';
        rowsEl.appendChild(tr);
        if(pop>=50){pushAdvice('High chance of rain \u2014 postpone pesticide/fertilizer sprays and consider covering sensitive crops.');tr.querySelector('.action-cell').textContent='Postpone sprays';}
        else if(pop>=20){pushAdvice('Chance of rain \u2014 schedule field work carefully.');tr.querySelector('.action-cell').textContent='Caution: rain possible';}
        if(temp!==''&&temp>=35){pushAdvice('High temperature \u2014 irrigate early morning and monitor heat stress.');tr.querySelector('.action-cell').textContent=tr.querySelector('.action-cell').textContent?tr.querySelector('.action-cell').textContent+'; Irrigate':'Irrigate';}
        if(wind&&parseFloat(wind)>=8){pushAdvice('Strong winds \u2014 secure structures and avoid spraying.');tr.querySelector('.action-cell').textContent='Avoid spraying';}
      });
    }else if(forecast&&forecast.daily){
      const take=(__range==='2d')?2:7;
      forecast.daily.slice(0,take).forEach(d=>{
        const when=fmt(d.dt);const tmin=d.temp&&d.temp.min?Math.round(d.temp.min):'';const tmax=d.temp&&d.temp.max?Math.round(d.temp.max):'';
        const pop=(d.pop!=null)?Math.round(d.pop*100):'';const weather=(d.weather&&d.weather[0]&&d.weather[0].description)||'';
        const wind=d.wind_speed!=null?(Math.round(d.wind_speed*10)/10):'';
        const tr=document.createElement('tr');
        tr.innerHTML='<td>'+tmin+' \u2014 '+tmax+'</td><td>'+pop+'</td><td>'+weather+'</td><td>'+wind+'</td><td class="action-cell" style="color:#fbbf24;font-size:12px"></td>';
        const firstTd=document.createElement('td');firstTd.textContent=when;tr.insertBefore(firstTd,tr.firstChild);
        rowsEl.appendChild(tr);
        if(pop>=50){pushAdvice('High chance of rain \u2014 postpone sprays and cover crops.');tr.querySelector('.action-cell').textContent='Postpone sprays';}
        else if(pop>=20){pushAdvice('Chance of rain \u2014 schedule field work carefully.');tr.querySelector('.action-cell').textContent='Caution: rain possible';}
        if(tmax>=35){pushAdvice('High temperature \u2014 irrigate early and monitor heat stress.');tr.querySelector('.action-cell').textContent=tr.querySelector('.action-cell').textContent?tr.querySelector('.action-cell').textContent+'; Irrigate':'Irrigate';}
        if(tmin<=3){pushAdvice('Low temperatures \u2014 protect seedlings from frost.');tr.querySelector('.action-cell').textContent='Protect seedlings';}
        if(wind&&parseFloat(wind)>=8){pushAdvice('Strong winds \u2014 secure structures and avoid spraying.');tr.querySelector('.action-cell').textContent='Avoid spraying';}
      });
    }else if(forecast&&forecast.fallback_forecast&&forecast.fallback_forecast.list){
      const take=(__range==='24h')?8:(__range==='2d'?16:(forecast.fallback_forecast.list.length||0));
      const list=forecast.fallback_forecast.list.slice(0,take);
      list.forEach(e=>{
        const when=e.dt_txt||fmt(e.dt);const temp=e.main&&e.main.temp?Math.round(e.main.temp):'';
        const pop=(e.pop!=null)?Math.round(e.pop*100):'';const weather=(e.weather&&e.weather[0]&&e.weather[0].description)||'';
        const wind=e.wind&&e.wind.speed!=null?(Math.round(e.wind.speed*10)/10):'';
        const tr=document.createElement('tr');
        tr.innerHTML='<td>'+when+'</td><td>'+temp+'</td><td>'+pop+'</td><td>'+weather+'</td><td>'+wind+'</td><td class="action-cell" style="color:#fbbf24;font-size:12px"></td>';
        rowsEl.appendChild(tr);
        if(pop>=50){pushAdvice('Heavy rain likely \u2014 postpone sprays and protect harvested produce.');tr.querySelector('.action-cell').textContent='Postpone sprays';}
        else if(pop>=20){pushAdvice('Light showers possible \u2014 delay spraying and check drainage.');tr.querySelector('.action-cell').textContent='Caution: showers';}
        if(temp>=35){pushAdvice('High daytime temperature \u2014 increase irrigation frequency.');tr.querySelector('.action-cell').textContent=tr.querySelector('.action-cell').textContent?tr.querySelector('.action-cell').textContent+'; Irrigate':'Irrigate';}
        if(e.wind&&e.wind.speed&&e.wind.speed>=8){pushAdvice('Gusty conditions \u2014 avoid spraying and secure infrastructure.');tr.querySelector('.action-cell').textContent='Avoid spraying';}
      });
    }

    const autoDiv=document.getElementById('auto-advice');autoDiv.innerHTML='';
    if(autoAdvice.length===0){autoDiv.textContent=(window.__t&&window.__t('weather.no_advice'))||'No specific advice for the next days.';}
    else{const ul=document.createElement('ul');ul.style.cssText='padding-left:18px;line-height:1.8';autoAdvice.forEach(a=>{const li=document.createElement('li');li.textContent=a;ul.appendChild(li);});autoDiv.appendChild(ul);}
  }

  setRange(__range);
  try{if(typeof ensureI18nLoaded==='function')ensureI18nLoaded(function(){try{if(typeof applyTranslations==='function')applyTranslations();}catch(e){}});}catch(e){}
</script>
</body>
