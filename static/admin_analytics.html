<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriAI-360 | Analytics</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<div id="admin-nav-placeholder"></div>
<script src="/admin-header.js"></script>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Analytics <span class="gradient-text">Overview</span></h1>
    <p class="mt-1 text-slate-400 text-sm">Quick metrics on commodities and diseases in the system.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <div class="glass-panel rounded-3xl p-8 flex items-center gap-6">
      <div class="w-16 h-16 rounded-2xl bg-emerald-500/15 flex items-center justify-center text-emerald-400 text-3xl flex-shrink-0">
        <i class="fa-solid fa-layer-group"></i>
      </div>
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Total Commodities</div>
        <div id="count-com" class="text-4xl font-extrabold text-white">—</div>
      </div>
    </div>
    <div class="glass-panel rounded-3xl p-8 flex items-center gap-6">
      <div class="w-16 h-16 rounded-2xl bg-blue-500/15 flex items-center justify-center text-blue-400 text-3xl flex-shrink-0">
        <i class="fa-solid fa-stethoscope"></i>
      </div>
      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Total Diseases</div>
        <div id="count-dis" class="text-4xl font-extrabold text-white">—</div>
      </div>
    </div>
  </div>
</main>

<script>
async function loadAnalytics(){
  try{
    const r = await fetch('/admin/data', {credentials:'include'});
    const d = await r.json();
    document.getElementById('count-com').textContent = (d.commodities||[]).length;
    document.getElementById('count-dis').textContent = (d.diseases||[]).length;
  }catch(e){}
}
loadAnalytics();
</script>
</body>
</html>
