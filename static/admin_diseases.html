<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriAI-360 | Diseases</title>
    <link rel="icon" type="image/png" href="/icons/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif!important}
    .glass-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 30px rgba(0,0,0,.12)}
    .gradient-text{background:linear-gradient(135deg,#34d399 0%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .agri-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#f1f5f9;transition:border-color .2s,box-shadow .2s;font-family:'Poppins',sans-serif}
    .agri-input:focus{outline:none;border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
    .agri-input::placeholder{color:rgba(255,255,255,.3)}
  </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100">

<div id="admin-nav-placeholder"></div>
<script src="/admin-header.js"></script>

<main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16">
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Manage <span class="gradient-text">Diseases</span></h1>
    <p class="mt-1 text-slate-400 text-sm">Add disease info used by the AI detection system.</p>
  </div>

  <div class="glass-panel rounded-3xl p-8 mb-6">
    <h2 class="text-base font-semibold text-slate-300 mb-4 flex items-center gap-2"><i class="fa-solid fa-plus text-emerald-400 fa-sm"></i>Add Disease Info</h2>
    <div class="flex flex-col gap-3">
      <input type="text" id="disease" placeholder="Disease name" class="agri-input w-full px-4 py-3 rounded-xl text-sm">
      <textarea id="solution" rows="3" placeholder="Solution / description" class="agri-input w-full px-4 py-3 rounded-xl text-sm resize-none"></textarea>
      <button onclick="addDisease()" class="self-end px-5 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold text-sm shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/40 hover:-translate-y-0.5 transition-all flex items-center gap-2">
        <i class="fa-solid fa-plus fa-sm"></i> Add Disease
      </button>
    </div>
  </div>

  <div class="glass-panel rounded-3xl p-8">
    <h2 class="text-base font-semibold text-slate-300 mb-5 flex items-center gap-2"><i class="fa-solid fa-stethoscope text-amber-400 fa-sm"></i>Existing Diseases</h2>
    <div id="disease-list"></div>
  </div>
</main>

<script src="/admin.js"></script>
</body>
</html>
